# SPIRE agent — runs on every GPU worker host and on the API/gateway host.
#
# On a GPU host it hands `worker_agent.py` an X.509-SVID for
# `spiffe://xcelsior.ca/worker/host/<host_id>`; on the gateway host it
# gives Envoy its server certificate and the trust bundle over the
# Workload API (no certificate files on disk, no manual rotation).

agent {
  data_dir           = "/opt/spire/data/agent"
  log_level          = "INFO"
  server_address     = "${SPIRE_SERVER_ADDRESS}"
  server_port        = "8081"
  socket_path        = "/run/spire/sockets/agent.sock"
  trust_domain       = "xcelsior.ca"
  trust_bundle_path  = "/opt/spire/conf/agent/bootstrap.crt"

  # Re-attest rather than fail permanently when the server was
  # unreachable at boot — a GPU host must rejoin the mesh unattended.
  retry_bootstrap = true
}

plugins {
  NodeAttestor "x509pop" {
    plugin_data {
      private_key_path  = "/opt/spire/conf/agent/host.key"
      certificate_path  = "/opt/spire/conf/agent/host.crt"
    }
  }

  NodeAttestor "join_token" {
    plugin_data {}
  }

  KeyManager "memory" {
    plugin_data {}
  }

  # Workload attestation binds an SVID to the *process*, so a container
  # on the host cannot request the host's worker identity.
  WorkloadAttestor "unix" {
    plugin_data {
      discover_workload_path = true
    }
  }

  WorkloadAttestor "docker" {
    plugin_data {
      docker_socket_path = "unix:///var/run/docker.sock"
    }
  }
}

health_checks {
  listener_enabled = true
  bind_address     = "0.0.0.0"
  bind_port        = "8082"
  live_path        = "/live"
  ready_path       = "/ready"
}
