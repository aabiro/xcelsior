# SPIRE server — Xcelsior worker identity (blueprint §19.2 / §19.3).
#
# Deployed by `docker compose -f infra/spire/docker-compose.spire.yml up`.
# Every admitted GPU host gets a node identity through x509pop attestation
# and a workload SVID of the exact shape the control plane verifies:
#
#     spiffe://xcelsior.ca/worker/host/<host_id>
#
# `control_plane.identity.parse_worker_spiffe_id` rejects anything else,
# so a certificate from another trust domain — or a workload in this one
# that is not a registered worker — cannot act as a GPU host.

server {
  bind_address    = "0.0.0.0"
  bind_port       = "8081"
  socket_path     = "/tmp/spire-server/private/api.sock"
  trust_domain    = "xcelsior.ca"
  data_dir        = "/opt/spire/data/server"
  log_level       = "INFO"

  # Short-lived SVIDs are the point: a credential lifted off a host is
  # useless within the hour, without any revocation round trip.
  ca_ttl                 = "24h"
  default_x509_svid_ttl  = "1h"
  default_jwt_svid_ttl   = "5m"

  ca_subject {
    country      = ["CA"]
    organization = ["Xcelsior"]
    common_name  = "Xcelsior SPIRE CA"
  }
}

plugins {
  # PostgreSQL keeps the registration entries in the same failure domain
  # as the rest of the control plane, and survives a server restart.
  # Swap to sqlite3 only for a single-node evaluation deploy.
  DataStore "sql" {
    plugin_data {
      database_type     = "postgres"
      connection_string = "${SPIRE_DATASTORE_DSN}"
    }
  }

  # Node attestation: proof-of-possession of a host key pair issued at
  # provisioning time. Unlike join tokens this does not expire after one
  # use, so a host that reboots re-attests without operator action.
  NodeAttestor "x509pop" {
    plugin_data {
      ca_bundle_path = "/opt/spire/conf/server/agent-ca.pem"
    }
  }

  # Join tokens stay enabled for bootstrapping a host that does not yet
  # have an attestation certificate.
  NodeAttestor "join_token" {
    plugin_data {}
  }

  KeyManager "disk" {
    plugin_data {
      keys_path = "/opt/spire/data/server/keys.json"
    }
  }

  # Envoy consumes the trust bundle and its own SVID over the Workload
  # API; no static certificate files are distributed.
  Notifier "k8sbundle" {
    plugin_data {}
  }
}

health_checks {
  listener_enabled = true
  bind_address     = "0.0.0.0"
  bind_port        = "8080"
  live_path        = "/live"
  ready_path       = "/ready"
}
