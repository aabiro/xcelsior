# NFS-Ganesha export for Xcelsior persistent volumes (Tailscale mesh clients).
NFS_CORE_PARAM {
    Nb_Worker = 4;
    Plugins_Dir = "/usr/lib/ganesha";
    DBus_App_Name = "org.ganesha.nfsd";
    NFS_Port = 2049;
    MNT_Port = 20048;
    NLM_Port = 32803;
    Enable_NFSACL = false;
    Enable_NFS_V3 = false;
    Clustered = false;
    NFS_Protocols = 4;
}

NFSV4 {
    Grace_Period = 90;
    Lease_Lifetime = 90;
    RecoveryBackend = "fs";
}

EXPORT_DEFAULTS {
    Access_Type = RW;
    Squash = No_Root_Squash;
    SecType = sys;
}

EXPORT {
    Export_Id = 1;
    Path = /exports/volumes;
    Pseudo = /exports/volumes;
    Access_Type = RW;
    Squash = No_Root_Squash;
    FSAL {
        Name = VFS;
    }
    CLIENT {
        Clients = 100.64.0.0/10;
        Access_Type = RW;
    }
}

LOG {
    Default_Log_Level = EVENT;
    Components {
        ALL = EVENT;
    }
    Facility {
        name = FILE;
        destination = "/var/log/ganesha/ganesha.log";
    }
}