# Xcelsior OpenAPI overrides for Fern SDK generation
# Maps endpoints to clean SDK method names via x-fern-sdk-method-name
# and groups via x-fern-sdk-group-name so the generated TypeScript SDK
# has intuitive names like client.hosts.list() instead of client.hosts.apiListHosts().

