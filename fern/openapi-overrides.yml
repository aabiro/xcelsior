  /hosts:
    get:
      x-fern-sdk-group-name: hosts
      x-fern-sdk-method-name: list
  /host:
    put:
      x-fern-sdk-group-name: hosts
      x-fern-sdk-method-name: register
  /host/{host_id}:
    get:
      x-fern-sdk-group-name: hosts
      x-fern-sdk-method-name: get
    delete:
      x-fern-sdk-group-name: hosts
      x-fern-sdk-method-name: remove
  /hosts/check:
    post:
      x-fern-ignore: true
      x-fern-sdk-group-name: hosts
      x-fern-sdk-method-name: check
  /hosts/ca:
    get:
      x-fern-sdk-group-name: hosts
      x-fern-sdk-method-name: listCanadian
  /compute-scores:
    get:
      x-fern-sdk-group-name: hosts
      x-fern-sdk-method-name: listComputeScores
  /compute-score/{host_id}:
    get:
      x-fern-sdk-group-name: hosts
      x-fern-sdk-method-name: getComputeScore

