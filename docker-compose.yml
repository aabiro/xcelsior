services:
  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port ${XCELSIOR_API_PORT:-9500}
    environment:
      XCELSIOR_ENV: ${XCELSIOR_ENV:-production}
      XCELSIOR_API_TOKEN: ${XCELSIOR_API_TOKEN}
      XCELSIOR_DB_BACKEND: ${XCELSIOR_DB_BACKEND:-postgres}
      XCELSIOR_DB_PATH: /data/xcelsior.db
      XCELSIOR_AUTH_DB_PATH: /data/auth.db
      XCELSIOR_BILLING_DB_PATH: /data/xcelsior_billing.db
      XCELSIOR_REPUTATION_DB_PATH: /data/xcelsior_reputation.db
      XCELSIOR_INFERENCE_DB_PATH: /data/inference.db
      XCELSIOR_CHAT_DB_PATH: /data/chat.db
      XCELSIOR_TRANSPARENCY_DB_PATH: /data/xcelsior_transparency.db
      XCELSIOR_SLA_DB: /data/xcelsior_sla.db
      XCELSIOR_BTC_DB: /data/xcelsior_btc.db
      XCELSIOR_STRIPE_DB: /data/xcelsior_stripe.db
      XCELSIOR_HOSTS_FILE: /data/hosts.json
      XCELSIOR_JOBS_FILE: /data/jobs.json
      XCELSIOR_BILLING_FILE: /data/billing.json
      XCELSIOR_MARKETPLACE_FILE: /data/marketplace.json
      XCELSIOR_AUTOSCALE_FILE: /data/autoscale_pool.json
      XCELSIOR_SPOT_PRICES_FILE: /data/spot_prices.json
      XCELSIOR_COMPUTE_SCORES_FILE: /data/compute_scores.json
      XCELSIOR_LOG_FILE: /data/xcelsior.log
      XCELSIOR_POSTGRES_DSN: postgresql://xcelsior:${XCELSIOR_POSTGRES_PASSWORD:-xcelsior}@127.0.0.1:5432/${XCELSIOR_POSTGRES_DB:-xcelsior}
      XCELSIOR_DUAL_READ_FROM: ${XCELSIOR_DUAL_READ_FROM:-postgres}
      XCELSIOR_RATE_LIMIT_REQUESTS: ${XCELSIOR_RATE_LIMIT_REQUESTS:-120}
      XCELSIOR_RATE_LIMIT_WINDOW_SEC: ${XCELSIOR_RATE_LIMIT_WINDOW_SEC:-60}
      XCELSIOR_CANADA_ONLY: ${XCELSIOR_CANADA_ONLY:-false}
      XCELSIOR_PLATFORM_CUT: ${XCELSIOR_PLATFORM_CUT:-0.20}
      XCELSIOR_CAD_USD_RATE: ${XCELSIOR_CAD_USD_RATE:-0.73}
      XCELSIOR_SMTP_HOST: ${XCELSIOR_SMTP_HOST:-}
      XCELSIOR_SMTP_PORT: ${XCELSIOR_SMTP_PORT:-587}
      XCELSIOR_SMTP_USER: ${XCELSIOR_SMTP_USER:-}
      XCELSIOR_SMTP_PASS: ${XCELSIOR_SMTP_PASS:-}
      XCELSIOR_EMAIL_FROM: ${XCELSIOR_EMAIL_FROM:-}
      XCELSIOR_EMAIL_TO: ${XCELSIOR_EMAIL_TO:-}
      XCELSIOR_TG_TOKEN: ${XCELSIOR_TG_TOKEN:-}
      XCELSIOR_TG_CHAT_ID: ${XCELSIOR_TG_CHAT_ID:-}
      # OAuth providers
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      HUGGINGFACE_CLIENT_ID: ${HUGGINGFACE_CLIENT_ID:-}
      HUGGINGFACE_CLIENT_SECRET: ${HUGGINGFACE_CLIENT_SECRET:-}
      # Stripe Connect
      XCELSIOR_STRIPE_SECRET_KEY: ${XCELSIOR_STRIPE_SECRET_KEY:-}
      XCELSIOR_STRIPE_WEBHOOK_SECRET: ${XCELSIOR_STRIPE_WEBHOOK_SECRET:-}
      # Bitcoin Deposits
      XCELSIOR_BTC_ENABLED: ${XCELSIOR_BTC_ENABLED:-false}
      XCELSIOR_BTC_RPC_HOST: ${XCELSIOR_BTC_RPC_HOST:-127.0.0.1}
      XCELSIOR_BTC_RPC_PORT: ${XCELSIOR_BTC_RPC_PORT:-8332}
      XCELSIOR_BTC_RPC_USER: ${XCELSIOR_BTC_RPC_USER:-}
      XCELSIOR_BTC_RPC_PASS: ${XCELSIOR_BTC_RPC_PASS:-}
      XCELSIOR_BTC_CONFIRMATIONS: ${XCELSIOR_BTC_CONFIRMATIONS:-3}
      XCELSIOR_BTC_DEPOSIT_EXPIRY: ${XCELSIOR_BTC_DEPOSIT_EXPIRY:-1800}
      # Lightning Network Deposits (via clnrest over Tailscale)
      XCELSIOR_LN_ENABLED: ${XCELSIOR_LN_ENABLED:-false}
      XCELSIOR_LN_CLNREST_URL: ${XCELSIOR_LN_CLNREST_URL:-https://127.0.0.1:3010}
      XCELSIOR_LN_RUNE: ${XCELSIOR_LN_RUNE:-}
      XCELSIOR_LN_INVOICE_EXPIRY: ${XCELSIOR_LN_INVOICE_EXPIRY:-600}
      XCELSIOR_LN_DB_PATH: /data/xcelsior_ln.db
      XCELSIOR_LN_MIN_CAD: ${XCELSIOR_LN_MIN_CAD:-1}
      XCELSIOR_LN_MAX_CAD: ${XCELSIOR_LN_MAX_CAD:-1000}
      # SLA / Chat / Inference / Slurm
      XCELSIOR_SLURM_MAP: /data/slurm_jobs.json
      XCELSIOR_BASE_URL: ${XCELSIOR_BASE_URL:-https://xcelsior.ca}
      XCELSIOR_NFS_SERVER: ${XCELSIOR_NFS_SERVER:-}
      XCELSIOR_NFS_PATH: ${XCELSIOR_NFS_PATH:-}
      XCELSIOR_NFS_MOUNT: ${XCELSIOR_NFS_MOUNT:-/mnt/xcelsior-nfs}
      # Chat LLM
      CHAT_LLM_PROVIDER: ${CHAT_LLM_PROVIDER:-groq}
      CHAT_LLM_API_KEY: ${CHAT_LLM_API_KEY:-}
      CHAT_LLM_MODEL: ${CHAT_LLM_MODEL:-}
      CHAT_MAX_RESPONSE_TOKENS: ${CHAT_MAX_RESPONSE_TOKENS:-1024}
      CHAT_RATE_LIMIT: ${CHAT_RATE_LIMIT:-10}
      CHAT_FALLBACK_PROVIDER: ${CHAT_FALLBACK_PROVIDER:-}
      CHAT_FALLBACK_API_KEY: ${CHAT_FALLBACK_API_KEY:-}
      CHAT_FALLBACK_MODEL: ${CHAT_FALLBACK_MODEL:-}
      # AI Assistant (Xcel AI)
      FEATURE_AI_ASSISTANT: ${FEATURE_AI_ASSISTANT:-false}
      AI_ASSISTANT_ENABLE_LIVE_CALLS: ${AI_ASSISTANT_ENABLE_LIVE_CALLS:-false}
      AI_ASSISTANT_PROVIDER: ${AI_ASSISTANT_PROVIDER:-xai}
      AI_ASSISTANT_FALLBACK_PROVIDERS: ${AI_ASSISTANT_FALLBACK_PROVIDERS:-anthropic,openai}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_ASSISTANT_MODEL: ${AI_ASSISTANT_MODEL:-claude-3-5-haiku-20241022}
      AI_ASSISTANT_XAI_API_KEY: ${AI_ASSISTANT_XAI_API_KEY:-}
      AI_ASSISTANT_XAI_MODEL: ${AI_ASSISTANT_XAI_MODEL:-grok-4}
      AI_ASSISTANT_OPENAI_API_KEY: ${AI_ASSISTANT_OPENAI_API_KEY:-}
      AI_ASSISTANT_OPENAI_MODEL: ${AI_ASSISTANT_OPENAI_MODEL:-gpt-4o-mini}
      AI_ASSISTANT_MAX_TOKENS: ${AI_ASSISTANT_MAX_TOKENS:-4096}
      AI_ASSISTANT_RATE_LIMIT: ${AI_ASSISTANT_RATE_LIMIT:-20}
      # SSH for web terminal proxy
      XCELSIOR_SSH_KEY_PATH: /run/secrets/ssh_key
      XCELSIOR_SSH_USER: ${XCELSIOR_SSH_USER:-aaryn}
    network_mode: host
    volumes:
      - xcelsior-data:/data
      - ${HOME}/.ssh/xcelsior:/run/secrets/ssh_key:ro
    restart: unless-stopped

  scheduler-worker:
    build: .
    # network_mode: host — scheduler must reach Tailscale IPs for ping + SSH
    network_mode: host
    command: python -c "from scheduler import scheduler_main; scheduler_main()"
    environment:
      XCELSIOR_ENV: ${XCELSIOR_ENV:-production}
      XCELSIOR_API_TOKEN: ${XCELSIOR_API_TOKEN}
      XCELSIOR_DB_BACKEND: ${XCELSIOR_DB_BACKEND:-postgres}
      XCELSIOR_DB_PATH: /data/xcelsior.db
      XCELSIOR_AUTH_DB_PATH: /data/auth.db
      XCELSIOR_BILLING_DB_PATH: /data/xcelsior_billing.db
      XCELSIOR_REPUTATION_DB_PATH: /data/xcelsior_reputation.db
      XCELSIOR_SLA_DB: /data/xcelsior_sla.db
      XCELSIOR_SLURM_MAP: /data/slurm_jobs.json
      XCELSIOR_HOSTS_FILE: /data/hosts.json
      XCELSIOR_JOBS_FILE: /data/jobs.json
      XCELSIOR_BILLING_FILE: /data/billing.json
      XCELSIOR_MARKETPLACE_FILE: /data/marketplace.json
      XCELSIOR_AUTOSCALE_FILE: /data/autoscale_pool.json
      XCELSIOR_SPOT_PRICES_FILE: /data/spot_prices.json
      XCELSIOR_COMPUTE_SCORES_FILE: /data/compute_scores.json
      XCELSIOR_LOG_FILE: /data/xcelsior.log
      XCELSIOR_POSTGRES_DSN: postgresql://xcelsior:${XCELSIOR_POSTGRES_PASSWORD:-xcelsior}@127.0.0.1:5432/${XCELSIOR_POSTGRES_DB:-xcelsior}
      XCELSIOR_CANADA_ONLY: ${XCELSIOR_CANADA_ONLY:-false}
      XCELSIOR_PLATFORM_CUT: ${XCELSIOR_PLATFORM_CUT:-0.20}
      XCELSIOR_SMTP_HOST: ${XCELSIOR_SMTP_HOST:-}
      XCELSIOR_SMTP_PORT: ${XCELSIOR_SMTP_PORT:-587}
      XCELSIOR_SMTP_USER: ${XCELSIOR_SMTP_USER:-}
      XCELSIOR_SMTP_PASS: ${XCELSIOR_SMTP_PASS:-}
      XCELSIOR_EMAIL_FROM: ${XCELSIOR_EMAIL_FROM:-}
      XCELSIOR_EMAIL_TO: ${XCELSIOR_EMAIL_TO:-}
      XCELSIOR_TG_TOKEN: ${XCELSIOR_TG_TOKEN:-}
      XCELSIOR_TG_CHAT_ID: ${XCELSIOR_TG_CHAT_ID:-}
      XCELSIOR_SSH_KEY_PATH: /run/secrets/ssh_key
      XCELSIOR_SSH_USER: ${XCELSIOR_SSH_USER:-aaryn}
      XCELSIOR_REGISTRY: ${XCELSIOR_REGISTRY:-}
    volumes:
      - xcelsior-data:/data
      - ${HOME}/.ssh/xcelsior:/run/secrets/ssh_key:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://xcelsior.ca}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://xcelsior.ca}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
        NEXT_PUBLIC_REOWN_PROJECT_ID: ${NEXT_PUBLIC_REOWN_PROJECT_ID:-}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://xcelsior.ca}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    ports:
      - "${XCELSIOR_FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped

  ssh-gateway:
    build: .
    command: python ssh_gateway.py
    network_mode: host
    environment:
      XCELSIOR_POSTGRES_DSN: postgresql://xcelsior:${XCELSIOR_POSTGRES_PASSWORD:-xcelsior}@127.0.0.1:5432/${XCELSIOR_POSTGRES_DB:-xcelsior}
      SSH_GW_HEALTH_PORT: "9510"
      SSH_GW_MAX_CONNS: "10"
      SSH_GW_IDLE_TIMEOUT: "3600"
      SSH_GW_SYNC_INTERVAL: "30"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  xcelsior-data:
