name: Desktop CI

on:
  pull_request:
    paths:
      - "desktop/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/src/lib/desktop/**"
      - "frontend/src/__tests__/desktop-*.test.*"
      - "frontend/src/components/DesktopAppRuntime.tsx"
      - "frontend/src/components/DesktopStatusStrip.tsx"
      - "frontend/src/components/settings/NativeDesktopPreferences.tsx"
      - "frontend/src/app/(dashboard)/dashboard-shell.tsx"
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/src/lib/desktop/**"
      - "frontend/src/__tests__/desktop-*.test.*"
      - "frontend/src/components/DesktopAppRuntime.tsx"
      - "frontend/src/components/DesktopStatusStrip.tsx"
      - "frontend/src/components/settings/NativeDesktopPreferences.tsx"
      - "frontend/src/app/(dashboard)/dashboard-shell.tsx"

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: desktop

jobs:
  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install desktop dependencies
        run: npm ci

      - name: Type check control center
        run: npm run typecheck

      - name: Test control center
        run: npm test

      - name: Test native shell
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build native desktop shell
        run: npx tauri build --debug --no-bundle
