name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linters (uv lockfile)
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (black)
        run: uv run black --check *.py routes/*.py tests/

  compose:
    # Catch docker-compose.yml regressions (bad interpolation, malformed
    # service definitions) without needing a worker or live build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate docker-compose.yml
        run: docker compose config -q

  typecheck:
    # Zero-tolerance gate on pyright reportCallIssue + reportArgumentType +
    # reportAttributeAccessIssue — the wrong-kwarg / wrong-arg / wrong-type /
    # missing-symbol class of bug (e.g. passing customer_id= when the param is
    # user=, None into a str param, or importing a name that doesn't exist).
    # All backlogs are cleared, so scripts/pyright_gate.py fails on ANY finding
    # (it filters only the psycopg dynamic-SQL LiteralString noise). Deps +
    # pyright are pinned so the result matches local.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps + pyright (uv lockfile)
        run: uv sync --frozen
      - name: Wrong-call / wrong-arg gate (pyright)
        run: uv run python scripts/pyright_gate.py

  # Track A cross-cutting gate: the migration chain must cycle cleanly
  # (deploy runs `alembic upgrade head`; a broken downgrade would strand
  # a rollback), and the multi-process scheduler concurrency invariants
  # must hold on every change to the control plane.
  control-plane:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: xcelsior_test
          POSTGRES_USER: xcelsior
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U xcelsior"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      XCELSIOR_ENV: test
      XCELSIOR_API_TOKEN: test-token-not-for-production
      XCELSIOR_DB_BACKEND: postgres
      XCELSIOR_POSTGRES_DSN: "postgresql://xcelsior:test@localhost:5432/xcelsior_test"
      XCELSIOR_PG_DSN: "postgresql://xcelsior:test@localhost:5432/xcelsior_test"
      XCELSIOR_BG_TASKS: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies (uv lockfile)
        run: uv sync --frozen
      - name: Migration gate — fresh → head → pre-Track-A → head
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade 053
          uv run alembic upgrade head
      - name: Concurrency gate — 8-replica placement stress
        run: uv run pytest tests/test_control_plane_concurrency.py -q

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: xcelsior_test
          POSTGRES_USER: xcelsior
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U xcelsior"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      XCELSIOR_ENV: test
      XCELSIOR_BASE_URL: http://localhost:9501
      XCELSIOR_API_TOKEN: test-token-not-for-production
      # Full suite expects migrated Postgres tables (billing_cycles, sessions, …).
      XCELSIOR_DB_BACKEND: postgres
      XCELSIOR_POSTGRES_DSN: "postgresql://xcelsior:test@localhost:5432/xcelsior_test"
      XCELSIOR_PG_DSN: "postgresql://xcelsior:test@localhost:5432/xcelsior_test"
      XCELSIOR_PG_POOL_SIZE: "40"
      XCELSIOR_BG_TASKS: "false"
      XCELSIOR_SCHEDULER_URL: "http://127.0.0.1:9501"
      XCELSIOR_RATE_LIMIT_REQUESTS: "10000"
      XCELSIOR_AUTH_RATE_LIMIT_REQUESTS: "10000"
      # Honor pyproject timeout=180 (func_only); do not override with a lower cap.
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies (uv lockfile)
        run: uv sync --frozen
      - name: Cache Postgres schema (migrations)
        uses: actions/cache@v4
        with:
          path: ci-cache/pg_schema.sql
          key: pg-schema-${{ hashFiles('migrations/versions/**', 'migrations/env.py', 'alembic.ini') }}
      - name: Bootstrap Postgres schema
        env:
          PGPASSWORD: test
        run: bash scripts/ci_bootstrap_pg_schema.sh
      - name: Critical route auth audit
        run: uv run python scripts/audit_route_auth.py --critical --strict
      - name: Guarded route auth audit
        run: uv run python scripts/audit_route_auth.py --guarded --strict
      - name: Optional Stripe key (repository secret)
        # Uses XCELSIOR_STRIPE_SECRET_KEY only — no separate STRIPE_TEST_SECRET_KEY.
        run: |
          if [ -n "${{ secrets.XCELSIOR_STRIPE_SECRET_KEY }}" ]; then
            echo "XCELSIOR_STRIPE_SECRET_KEY=${{ secrets.XCELSIOR_STRIPE_SECRET_KEY }}" >> "$GITHUB_ENV"
          fi
      - name: Verify agent signatures present
        run: |
          test -f scripts/worker_agent.py.sig
          test -f scripts/security.py.sig
          test -f scripts/agent-signing.pub
          uv run python scripts/sign-static-agent.py
          git diff --exit-code scripts/*.sig || (echo "Agent signatures out of date — run scripts/sign-static-agent.py" && exit 1)
      - name: Run tests
        # P1.3 — single entrypoint. run-tests.sh centralises target
        # mappings (quick / ai / billing / security / e2e / live) and
        # keeps local + CI in sync. Passing no target runs the full
        # suite (excluding live e2e), same as invoking pytest tests/
        # but via the canonical script.
        run: bash run-tests.sh --verbose
      - name: Coverage report
        if: success()
        run: |
          uv run pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing \
                           -q --tb=line 2>/dev/null || true
      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
