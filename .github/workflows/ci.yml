name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install linters (uv lockfile)
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (black)
        run: uv run black --check *.py routes/*.py tests/

  compose:
    # Catch docker-compose.yml regressions (bad interpolation, malformed
    # service definitions) without needing a worker or live build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate docker-compose.yml
        run: docker compose config -q
      - name: Validate SPIRE mesh compose (infra/spire)
        env:
          SPIRE_DATASTORE_DSN: postgresql://spire:spire@127.0.0.1:5432/spire
          XCELSIOR_AGENT_GATEWAY_SECRET: ci-placeholder
        run: docker compose -f infra/spire/docker-compose.spire.yml config -q
      - name: Validate Envoy agent gateway config
        run: |
          docker run --rm -e XCELSIOR_AGENT_GATEWAY_SECRET=ci-placeholder \
            -v "$PWD/infra/envoy:/cfg:ro" \
            --entrypoint /bin/sh envoyproxy/envoy:v1.32-latest -c \
            'envsubst < /cfg/agent-gateway.yaml > /tmp/envoy.yaml &&
             envoy --mode validate -c /tmp/envoy.yaml'

  # Blueprint §19.6: supply-chain and image policy. An unprivileged image
  # is only a claim until something checks it, so the built artifact is
  # inspected here rather than trusted from the Dockerfile text.
  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write   # cosign keyless signing on main
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: xcelsior-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Image must run unprivileged (§19.4 / §21.1)
        run: |
          uid="$(docker run --rm xcelsior-api:ci id -u)"
          echo "runtime uid=$uid"
          test "$uid" != "0"
          test "$uid" -ge 1000
      - name: Image must boot with a read-only root filesystem
        run: |
          docker run --rm --read-only --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --tmpfs /dev/shm:rw,size=64m \
            -e XCELSIOR_DB_BACKEND=sqlite -e XCELSIOR_DB_PATH=/tmp/ci.db \
            xcelsior-api:ci python -c "import api; print('boot ok')"
      - name: Image must not ship privileged volume tooling (§19.4)
        run: |
          ! docker run --rm --entrypoint /bin/sh xcelsior-api:ci -c \
            'command -v cryptsetup || command -v mkfs.ext4'
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: xcelsior-api:ci
          format: spdx-json
          artifact-name: xcelsior-api-sbom.spdx.json
      - name: Vulnerability scan (Trivy) — block CRITICAL
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: xcelsior-api:ci
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
      - name: Vulnerability report (HIGH, non-blocking)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: xcelsior-api:ci
          format: table
          exit-code: '0'
          severity: HIGH
          ignore-unfixed: true
      - name: MCP image must run unprivileged with a locked install
        run: |
          docker build -t xcelsior-mcp:ci ./mcp
          uid="$(docker run --rm --entrypoint id xcelsior-mcp:ci -u)"
          test "$uid" != "0"
          ! grep -qE '^\s*RUN .*npm install' mcp/Dockerfile
      - name: Install cosign
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: sigstore/cosign-installer@v3
      - name: Sign the worker agent artifact (keyless OIDC)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cosign sign-blob --yes \
            --output-signature worker_agent.py.cosign.sig \
            --output-certificate worker_agent.py.cosign.pem \
            worker_agent.py
      - name: Upload signing material
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: worker-agent-signature
          path: |
            worker_agent.py.cosign.sig
            worker_agent.py.cosign.pem

  typecheck:
    # Zero-tolerance gate on pyright reportCallIssue + reportArgumentType +
    # reportAttributeAccessIssue — the wrong-kwarg / wrong-arg / wrong-type /
    # missing-symbol class of bug (e.g. passing customer_id= when the param is
    # user=, None into a str param, or importing a name that doesn't exist).
    # All backlogs are cleared, so scripts/pyright_gate.py fails on ANY finding
    # (it filters only the psycopg dynamic-SQL LiteralString noise). Deps +
    # pyright are pinned so the result matches local.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps + pyright (uv lockfile)
        run: uv sync --frozen
      - name: Wrong-call / wrong-arg gate (pyright)
        run: uv run python scripts/pyright_gate.py

  # Track A cross-cutting gate: the migration chain must cycle cleanly
  # (deploy runs `alembic upgrade head`; a broken downgrade would strand
  # a rollback), and the multi-process scheduler concurrency invariants
  # must hold on every change to the control plane.
  control-plane:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: xcelsior_test
          POSTGRES_USER: xcelsior
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U xcelsior"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      XCELSIOR_ENV: test
      XCELSIOR_API_TOKEN: test-token-not-for-production
      XCELSIOR_DB_BACKEND: postgres
      XCELSIOR_POSTGRES_DSN: "postgresql://xcelsior:test@localhost:5432/xcelsior_test"
      XCELSIOR_PG_DSN: "postgresql://xcelsior:test@localhost:5432/xcelsior_test"
      XCELSIOR_BG_TASKS: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies (uv lockfile)
        run: uv sync --frozen
      # Track B B1.1: static ledger gate. Runs before anything touches a
      # database — a parallel head, a chain skip, or a hash revision id is
      # cheaper to reject here than after a 30-minute job.
      - name: Migration ledger gate — one head, ordered chain, numeric ids
        run: uv run pytest tests/test_migration_ledger.py -q
      # A1.6: deterministic from-empty bootstrap (alembic upgrade head).
      # No schema-dump cache — migration 056 creates agent_commands base.
      - name: Bootstrap Postgres schema (from empty)
        env:
          PGPASSWORD: test
        run: bash scripts/ci_bootstrap_pg_schema.sh
      - name: Migration reversibility gate — head → pre-Track-A (053) → head
        # Exercises that the Track A migrations (054–059) downgrade and
        # re-upgrade cleanly, so a production rollback can never strand.
        run: |
          uv run alembic downgrade 053
          uv run alembic upgrade head
      # Track B B1.2: from-empty proves the DDL applies; this proves the
      # BACKFILLS survive real rows. Needs CREATE DATABASE, which the CI
      # postgres superuser has (locally the suite falls back to sudo).
      - name: Production-shaped migration rehearsal — 053 + rows → head
        env:
          PGPASSWORD: test
        run: uv run pytest tests/test_migration_from_production_snapshot.py -q
      - name: Concurrency gate — 8-replica placement stress
        run: uv run pytest tests/test_control_plane_concurrency.py -q

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: xcelsior_test
          POSTGRES_USER: xcelsior
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U xcelsior"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      XCELSIOR_ENV: test
      XCELSIOR_BASE_URL: http://localhost:9501
      XCELSIOR_API_TOKEN: test-token-not-for-production
      # Full suite expects migrated Postgres tables (billing_cycles, sessions, …).
      XCELSIOR_DB_BACKEND: postgres
      XCELSIOR_POSTGRES_DSN: "postgresql://xcelsior:test@localhost:5432/xcelsior_test"
      XCELSIOR_PG_DSN: "postgresql://xcelsior:test@localhost:5432/xcelsior_test"
      XCELSIOR_PG_POOL_SIZE: "40"
      XCELSIOR_BG_TASKS: "false"
      XCELSIOR_SCHEDULER_URL: "http://127.0.0.1:9501"
      XCELSIOR_RATE_LIMIT_REQUESTS: "10000"
      XCELSIOR_AUTH_RATE_LIMIT_REQUESTS: "10000"
      # Honor pyproject timeout=180 (func_only); do not override with a lower cap.
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies (uv lockfile)
        run: uv sync --frozen
      - name: Bootstrap Postgres schema (from empty)
        env:
          PGPASSWORD: test
        run: bash scripts/ci_bootstrap_pg_schema.sh
      - name: Critical route auth audit
        run: uv run python scripts/audit_route_auth.py --critical --strict
      - name: Guarded route auth audit
        run: uv run python scripts/audit_route_auth.py --guarded --strict
      - name: Optional Stripe key (repository secret)
        # Uses XCELSIOR_STRIPE_SECRET_KEY only — no separate STRIPE_TEST_SECRET_KEY.
        run: |
          if [ -n "${{ secrets.XCELSIOR_STRIPE_SECRET_KEY }}" ]; then
            echo "XCELSIOR_STRIPE_SECRET_KEY=${{ secrets.XCELSIOR_STRIPE_SECRET_KEY }}" >> "$GITHUB_ENV"
          fi
      - name: Verify agent signatures present
        run: |
          test -f scripts/worker_agent.py.sig
          test -f scripts/security.py.sig
          test -f scripts/agent-signing.pub
          uv run python scripts/sign-static-agent.py
          git diff --exit-code scripts/*.sig || (echo "Agent signatures out of date — run scripts/sign-static-agent.py" && exit 1)
      - name: Run tests
        # P1.3 — single entrypoint. run-tests.sh centralises target
        # mappings (quick / ai / billing / security / e2e / live) and
        # keeps local + CI in sync. Passing no target runs the full
        # suite (excluding live e2e), same as invoking pytest tests/
        # but via the canonical script.
        run: bash run-tests.sh --verbose
      - name: Coverage report
        if: success()
        run: |
          uv run pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing \
                           -q --tb=line 2>/dev/null || true
      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
