name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0). Leave blank to use tauri.conf.json version.'
        required: false
        type: string
      deploy:
        description: 'Upload binaries to downloads.xcelsior.ca'
        required: false
        type: boolean
        default: true

permissions:
  contents: write  # For creating GitHub releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: desktop

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            label: linux
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            label: macos
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # ── Linux dependencies ──────────────────────────────────────────
      - name: Install Linux desktop dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      # ── Toolchains ──────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # ── Version override ────────────────────────────────────────────
      - name: Set version
        if: inputs.version != ''
        shell: bash
        run: |
          cd src-tauri
          jq --arg v "${{ inputs.version }}" '.version = $v' tauri.conf.json > tmp.json
          mv tmp.json tauri.conf.json

      # ── Build ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Install cargo-tauri
        run: cargo install tauri-cli
        working-directory: .

      - name: Build desktop app
        run: cargo tauri build --target ${{ matrix.rust-target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── Collect artifacts ───────────────────────────────────────────
      - name: Collect Linux artifacts
        if: matrix.label == 'linux'
        shell: bash
        run: |
          mkdir -p ../artifacts
          cp src-tauri/target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage ../artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.rust-target }}/release/bundle/deb/*.deb ../artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.rust-target }}/release/bundle/rpm/*.rpm ../artifacts/ 2>/dev/null || true
          ls -lh ../artifacts/

      - name: Collect macOS artifacts
        if: matrix.label == 'macos'
        shell: bash
        run: |
          mkdir -p ../artifacts
          cp src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg ../artifacts/ 2>/dev/null || true
          ls -lh ../artifacts/

      - name: Collect Windows artifacts
        if: matrix.label == 'windows'
        shell: bash
        run: |
          mkdir -p ../artifacts
          cp src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe ../artifacts/ 2>/dev/null || true
          cp src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi ../artifacts/ 2>/dev/null || true
          ls -lh ../artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: artifacts/*
          retention-days: 30

  # ── Release & Deploy ──────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(jq -r .version desktop/src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"
          fi
        working-directory: .

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/
        working-directory: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-v${{ steps.version.outputs.version }}
          name: Xcelsior Desktop v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: artifacts/*
          generate_release_notes: true

      - name: Deploy to downloads.xcelsior.ca
        if: inputs.deploy
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Upload all artifacts
          scp -i ~/.ssh/deploy_key artifacts/* "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/"

          # Move into place
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" '
            sudo rm -f /var/www/downloads/desktop/*
            sudo mv /tmp/Xcelsior* /var/www/downloads/desktop/ 2>/dev/null || true
            sudo chmod 644 /var/www/downloads/desktop/*
            echo "Deployed:"
            ls -lh /var/www/downloads/desktop/
          '

          rm -f ~/.ssh/deploy_key
        working-directory: .
