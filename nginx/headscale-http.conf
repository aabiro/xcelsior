# Headscale HTTP Redirect / ACME Configuration
# Deploy to: /etc/nginx/sites-available/headscale-http
# Enable with: ln -s /etc/nginx/sites-available/headscale-http /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name hs.xcelsior.ca;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
