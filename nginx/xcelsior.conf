# Xcelsior API Nginx Configuration
# Deploy to: /etc/nginx/sites-available/xcelsior
# Enable with: ln -s /etc/nginx/sites-available/xcelsior /etc/nginx/sites-enabled/
# Headscale uses dedicated configs: nginx/headscale.conf and nginx/headscale-http.conf

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=xcelsior_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=xcelsior_conn:10m;

# Upstream for API
upstream xcelsior_api {
    server 127.0.0.1:9500;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name xcelsior.ca www.xcelsior.ca;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main API server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xcelsior.ca www.xcelsior.ca;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/xcelsior.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xcelsior.ca/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/xcelsior.ca/chain.pem;

    # SSL configuration (Mozilla Modern)
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Connection limit (rate limiting applied per-location)
    limit_conn xcelsior_conn 20;

    # Client body size (for artifact uploads)
    client_max_body_size 500M;
    client_body_timeout 300s;

    # Proxy timeouts (long-running jobs)
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Health check (no rate limit, no logging)
    location /healthz {
        access_log off;
        proxy_pass http://xcelsior_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /readyz {
        access_log off;
        proxy_pass http://xcelsior_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SSE endpoints (disable buffering for real-time streaming)
    location ~ ^/api/stream {
        proxy_pass http://xcelsior_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE specific settings
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;  # 24 hours for long SSE connections
    }

    location ~ ^/jobs/.*/logs/stream {
        proxy_pass http://xcelsior_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE specific settings
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # WebSocket support (for future features)
    location /ws {
        proxy_pass http://xcelsior_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Static files caching (dashboard assets)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://xcelsior_api;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Worker agent endpoints (exempt from rate limiting)
    location /host {
        proxy_pass http://xcelsior_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /agent/ {
        proxy_pass http://xcelsior_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Main application (with rate limiting)
    location / {
        limit_req zone=xcelsior_limit burst=50 nodelay;
        proxy_pass http://xcelsior_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Connection pooling
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ^/(\.env|\.git|__pycache__|tests) {
        deny all;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Logging
    access_log /var/log/nginx/xcelsior.access.log combined;
    error_log /var/log/nginx/xcelsior.error.log warn;
}
