# MCP ingress — mcp.xcelsior.ca (blueprint Phase 10 / §17.1, §22)
# Separate from public marketing and from agent.xcelsior.ca.
# Public clients never terminate agent mTLS here.

upstream xcelsior_mcp {
    server 127.0.0.1:3100;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name mcp.xcelsior.ca;

    # TLS certs managed by the platform cert pipeline (paths are conventional).
    ssl_certificate     /etc/nginx/certs/mcp.xcelsior.ca/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/mcp.xcelsior.ca/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Strip any client-injected worker identity headers (public surface).
    proxy_set_header X-Worker-Host-Id "";
    proxy_set_header X-Worker-Spiffe-Id "";
    proxy_set_header X-Spiffe-Id "";
    proxy_set_header X-Xcelsior-Agent-Gateway "";

    location = /health {
        proxy_pass http://xcelsior_mcp/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /mcp {
        proxy_pass http://xcelsior_mcp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        return 404;
    }
}
