# downloads.xcelsior.ca — Static file hosting for desktop app downloads

# HTTP → HTTPS redirect (+ ACME challenge)
server {
    listen 80;
    listen [::]:80;
    server_name downloads.xcelsior.ca;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Static files
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name downloads.xcelsior.ca;

    # SSL certificates (Let's Encrypt) — placeholder until certbot runs
    ssl_certificate /etc/letsencrypt/live/downloads.xcelsior.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/downloads.xcelsior.ca/privkey.pem;

    # SSL configuration (Mozilla Modern)
    ssl_session_timeout 1d;
    ssl_session_cache shared:DownloadsSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # CORS for Tauri updater
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;

    root /var/www/downloads;

    location / {
        autoindex off;
        try_files $uri $uri/ =404;
    }

    # Cache static binaries aggressively
    location ~* \.(dmg|exe|AppImage|deb|rpm|msi|tar\.gz|zip)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # latest.json should not be cached (updater endpoint)
    location ~* latest\.json$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin "*" always;
    }
}
