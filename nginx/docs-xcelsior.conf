# docs.xcelsior.ca — Reverse proxy to Fern-hosted API documentation
# Deploy: ln -s /etc/nginx/sites-available/docs-xcelsior /etc/nginx/sites-enabled/

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name docs.xcelsior.ca;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Reverse proxy to Fern docs
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docs.xcelsior.ca;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/docs.xcelsior.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.xcelsior.ca/privkey.pem;

    # SSL configuration (Mozilla Modern)
    ssl_session_timeout 1d;
    ssl_session_cache shared:DocsSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript image/svg+xml text/x-component;

    # Rewrite tab-prefixed paths to flat paths (Fern tabs are client-side only)
    # /guides/quickstart -> /quickstart, /sdk/typescript-sdk -> /typescript-sdk
    rewrite ^/guides/(.+) /$1 break;
    rewrite ^/sdk/(.+) /$1 break;
    # Keep /api-reference as-is (Fern handles it as a redirect to auto-gen API docs)

    # Reverse proxy to Fern-hosted docs
    location / {
        proxy_pass https://xcelsior.docs.buildwithfern.com;
        proxy_ssl_server_name on;
        proxy_set_header Host xcelsior.docs.buildwithfern.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Accept-Encoding "";

        # Pass through query params (RSC requests use ?_rsc=...)
        proxy_pass_request_headers on;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;

        # Handle redirects from upstream
        proxy_redirect https://xcelsior.docs.buildwithfern.com https://docs.xcelsior.ca;
    }
}
