# Public worker-surface cutover (blueprint §22.1 / §22.3).
#
# Drop-in replacement for the `/host` and `/agent/` location blocks in
# nginx/xcelsior.conf once the fleet speaks to agent.xcelsior.ca.
#
#   include /etc/nginx/snippets/xcelsior-agent-retired.conf;
#
# Pair it with `XCELSIOR_AGENT_PUBLIC_INGRESS=deny` on the API. The edge
# alone is not the boundary: anything that reaches the API directly (a
# second origin, a container on the host network, an Nginx include that
# lands in the wrong order) would otherwise still find the surface open.
#
# 410 Gone rather than 404: a worker that has not been migrated gets an
# unambiguous, cacheable signal that the endpoint moved permanently, and
# the JSON body tells its operator exactly what to change.

location /host {
    default_type application/json;
    return 410 '{"ok":false,"error":{"code":"agent_ingress_retired","message":"Worker protocol moved to https://agent.xcelsior.ca — enrol this host in the SPIRE trust domain and set XCELSIOR_SCHEDULER_URL accordingly."}}';
}

location /agent/ {
    default_type application/json;
    return 410 '{"ok":false,"error":{"code":"agent_ingress_retired","message":"Worker protocol moved to https://agent.xcelsior.ca — enrol this host in the SPIRE trust domain and set XCELSIOR_SCHEDULER_URL accordingly."}}';
}

# The self-update bootstrap stays public: a host that cannot fetch the
# agent cannot be migrated onto the gateway in the first place.
location = /static/worker_agent.py {
    proxy_pass http://xcelsior_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass_header X-Xcelsior-Agent-SHA256;
    add_header Cache-Control "no-cache, must-revalidate" always;
}
