# Agent ingress — agent.xcelsior.ca (blueprint Phase 10 / §19.3)
# Private agent path: client cert (mTLS) or upstream Envoy/SPIRE gateway.
# After verification, set trusted identity headers for the API and mark
# X-Xcelsior-Agent-Gateway so the control plane fails closed without them
# when XCELSIOR_TRUSTED_AGENT_GATEWAY=1.

upstream xcelsior_api_agent {
    server 127.0.0.1:9500;
    keepalive 64;
}

map $ssl_client_s_dn $agent_host_id_from_cert {
    default "";
    # Operators map cert CN/URI SAN → host_id offline; fingerprint table
    # is preferred (see infra/spire). Placeholder keeps config valid.
    ~CN=(?<cn>[^,]+) $cn;
}

server {
    listen 443 ssl http2;
    server_name agent.xcelsior.ca;

    ssl_certificate     /etc/nginx/certs/agent.xcelsior.ca/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/agent.xcelsior.ca/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # mTLS: require client certificate (trust bundle rotated with SPIRE/CA).
    ssl_client_certificate /etc/nginx/certs/agent-client-ca.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;

    # Only agent protocol surfaces — not marketing or MCP.
    # Map gateway secret from env via include or set at deploy time:
    #   set $xcelsior_agent_gateway_secret "<from secrets store>";
    # Default empty rejects gateway mode at the API (fail closed).
    set $xcelsior_agent_gateway_secret "";

    location /agent/ {
        # Drop any client-supplied identity; re-set from verified cert only.
        proxy_set_header X-Worker-Host-Id $agent_host_id_from_cert;
        proxy_set_header X-Worker-Spiffe-Id $ssl_client_s_dn;
        proxy_set_header X-Xcelsior-Agent-Gateway "1";
        # Shared secret proves this request came from the private gateway
        # (public clients cannot set a matching X-Xcelsior-Gateway-Auth).
        proxy_set_header X-Xcelsior-Gateway-Auth $xcelsior_agent_gateway_secret;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://xcelsior_api_agent;
        proxy_read_timeout 120s;
    }

    location /host {
        proxy_set_header X-Worker-Host-Id $agent_host_id_from_cert;
        proxy_set_header X-Worker-Spiffe-Id $ssl_client_s_dn;
        proxy_set_header X-Xcelsior-Agent-Gateway "1";
        proxy_set_header X-Xcelsior-Gateway-Auth $xcelsior_agent_gateway_secret;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://xcelsior_api_agent;
        proxy_read_timeout 120s;
    }

    location / {
        return 404;
    }
}
