# Agent ingress — agent.xcelsior.ca (blueprint §19.3 / §22.3)
#
# INTERIM gateway. The production target is the SPIFFE-aware Envoy
# gateway in `infra/envoy/agent-gateway.yaml`, which derives identity
# from a SPIRE-issued SVID. This Nginx config validates a client
# certificate but has only a certificate DN — *not* a SPIFFE ID — so it
# must run with `XCELSIOR_SPIFFE_STRICT=0` on the API. Cut over to Envoy
# before enabling strict binding (which is the code default).
#
# Deliberately absent: any `X-Worker-Spiffe-Id` header. Synthesising one
# from a DN would manufacture an identity the mesh never issued, and the
# API's strict binding check would (correctly) reject it anyway.

upstream xcelsior_api_agent {
    server 127.0.0.1:9500;
    keepalive 64;
}

# Map the verified client certificate CN to a host_id. Operators
# maintain the CN → host_id relationship when issuing certificates;
# prefer the SPIRE/Envoy path, where this mapping is the SVID itself.
map $ssl_client_s_dn $agent_host_id_from_cert {
    default "";
    ~CN=(?<cn>[^,]+) $cn;
}

# Refuse to derive an identity from an unverified chain.
map $ssl_client_verify $agent_verified_host_id {
    default "";
    "SUCCESS" $agent_host_id_from_cert;
}

# Worker traffic is small and structured; separate limits from the user
# API so a misbehaving host cannot consume the product's budget (§22.3).
limit_req_zone $ssl_client_s_dn zone=agent_per_cert:10m rate=30r/s;

server {
    listen 443 ssl;
    http2 on;
    server_name agent.xcelsior.ca;

    ssl_certificate     /etc/nginx/certs/agent.xcelsior.ca/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/agent.xcelsior.ca/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # mTLS: require a client certificate from the managed trust bundle.
    # Rotate the bundle with `nginx -s reload`; connections in flight are
    # not dropped, so the fleet survives a CA roll.
    ssl_client_certificate /etc/nginx/certs/agent-client-ca.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;

    # Separate body/time limits from the user API (§22.3).
    client_max_body_size 8m;
    client_body_timeout 30s;
    client_header_timeout 15s;

    # The gateway shared secret proves to the API that this request came
    # from the private gateway. Public clients cannot set a matching
    # X-Xcelsior-Gateway-Auth. Injected at deploy time from the secret
    # store; empty means the API rejects gateway mode outright (closed).
    #   include /etc/nginx/snippets/agent-gateway-secret.conf;
    set $xcelsior_agent_gateway_secret "";

    # §22.3: allow only the fenced worker protocol. v1 stays reachable on
    # the public origin until the fleet migrates, then is retired there
    # too (nginx/snippets/xcelsior-agent-retired.conf).
    location /agent/v2/ {
        limit_req zone=agent_per_cert burst=60 nodelay;

        # Drop anything the client supplied; re-set from the verified
        # certificate only.
        proxy_set_header X-Worker-Host-Id $agent_verified_host_id;
        proxy_set_header X-Worker-Provider-Id "";
        proxy_set_header X-Spiffe-Id "";
        proxy_set_header X-Worker-Identity "";
        proxy_set_header X-Forwarded-Client-Cert "";
        proxy_set_header X-Xcelsior-Agent-Gateway "1";
        proxy_set_header X-Xcelsior-Gateway-Auth $xcelsior_agent_gateway_secret;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://xcelsior_api_agent;
        proxy_read_timeout 120s;
    }

    # v1 worker protocol during migration. Remove this block once every
    # host negotiates v2 (XCELSIOR_AGENT_V2_HOSTS=*).
    location /agent/ {
        limit_req zone=agent_per_cert burst=60 nodelay;

        proxy_set_header X-Worker-Host-Id $agent_verified_host_id;
        proxy_set_header X-Worker-Provider-Id "";
        proxy_set_header X-Spiffe-Id "";
        proxy_set_header X-Worker-Identity "";
        proxy_set_header X-Forwarded-Client-Cert "";
        proxy_set_header X-Xcelsior-Agent-Gateway "1";
        proxy_set_header X-Xcelsior-Gateway-Auth $xcelsior_agent_gateway_secret;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://xcelsior_api_agent;
        proxy_read_timeout 120s;
    }

    location /host {
        limit_req zone=agent_per_cert burst=30 nodelay;

        proxy_set_header X-Worker-Host-Id $agent_verified_host_id;
        proxy_set_header X-Worker-Provider-Id "";
        proxy_set_header X-Spiffe-Id "";
        proxy_set_header X-Worker-Identity "";
        proxy_set_header X-Forwarded-Client-Cert "";
        proxy_set_header X-Xcelsior-Agent-Gateway "1";
        proxy_set_header X-Xcelsior-Gateway-Auth $xcelsior_agent_gateway_secret;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://xcelsior_api_agent;
        proxy_read_timeout 120s;
    }

    # No frontend, no MCP, no general API proxying (§22.3).
    location / {
        return 404;
    }
}
