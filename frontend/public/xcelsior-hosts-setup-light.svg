  <defs>
    <linearGradient id="bg" x1="136" y1="42" x2="1036" y2="862" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="58%" stop-color="#F5FAFF"/>
      <stop offset="100%" stop-color="#FFF3EF"/>
    </linearGradient>

    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(404 84) rotate(90) scale(340 560)">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
