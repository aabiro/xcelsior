      <circle cx="356" cy="272" r="10" fill="#7C3AED" fill-opacity="0.78"/>
      <circle cx="382" cy="272" r="10" fill="#DC2626" fill-opacity="0.54"/>

      <circle cx="330" cy="408" r="10" fill="#0EA5E9" fill-opacity="0.48"/>
      <circle cx="356" cy="408" r="10" fill="#7C3AED" fill-opacity="0.62"/>
      <circle cx="382" cy="408" r="10" fill="#DC2626" fill-opacity="0.82"/>

