<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="rackStroke" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#5b21b6" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="serverHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 680) rotate(90) scale(280 260)">
      <stop offset="0%" stop-color="#5b21b6" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#0891b2" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="serverMaskG" x1="740" y1="420" x2="1180" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="serverMask">
      <rect x="0" y="0" width="1200" height="900" fill="black"/>
      <rect x="690" y="380" width="520" height="520" rx="8" fill="url(#serverMaskG)"/>
    </mask>
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="edgeFadeLeft" x1="0" y1="0" x2="125" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="edgeFadeTop" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="edgeFadeMask">
      <rect x="0" y="0" width="1200" height="900" fill="white"/>
      <rect x="0" y="0" width="125" height="900" fill="url(#edgeFadeLeft)"/>
      <rect x="0" y="0" width="1200" height="100" fill="url(#edgeFadeTop)"/>
    </mask>
    <linearGradient id="traceCyan" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0891b2" stop-opacity="0.85"/>
      <stop offset="80%" stop-color="#0891b2" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="traceViolet" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#5b21b6" stop-opacity="0"/>
      <stop offset="20%" stop-color="#5b21b6" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#5b21b6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="traceRed" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ea580c" stop-opacity="0"/>
      <stop offset="25%" stop-color="#ea580c" stop-opacity="0.7"/>
      <stop offset="75%" stop-color="#ea580c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="beamCyan" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0891b2" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0891b2" stop-opacity="1"/>
      <stop offset="60%" stop-color="#0891b2" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;2 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="beamViolet" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#5b21b6" stop-opacity="0"/>
      <stop offset="40%" stop-color="#5b21b6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5b21b6" stop-opacity="1"/>
      <stop offset="60%" stop-color="#5b21b6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;2 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <style>
      .twinkle{animation:twinkle 3s ease-in-out infinite}
      .twinkle-slow{animation:twinkle 4.8s ease-in-out infinite}
      .twinkle-offset{animation:twinkle 3.4s ease-in-out infinite; animation-delay: 1.2s}
      @keyframes twinkle{0%,100%{opacity:1}50%{opacity:.18}}
    </style>
  </defs>

  <g mask="url(#edgeFadeMask)">
    <!-- Circuit traces extending from server rack -->
    <g>
      <path d="M740 540H420" stroke="url(#traceCyan)" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M740 590H350" stroke="url(#traceViolet)" stroke-width="2.0" stroke-linecap="round"/>
      <path d="M740 640H480" stroke="url(#traceRed)" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M740 690H300" stroke="url(#traceCyan)" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M740 740H520" stroke="url(#traceViolet)" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M420 540L320 460" stroke="#0891b2" stroke-opacity="0.6" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M350 590L250 520" stroke="#5b21b6" stroke-opacity="0.55" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M480 640L380 720" stroke="#ea580c" stroke-opacity="0.5" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M300 690L200 620" stroke="#0891b2" stroke-opacity="0.45" stroke-width="1.4" stroke-linecap="round"/>
      <path d="M740 540H420" stroke="url(#beamCyan)" stroke-width="3" stroke-linecap="round"/>
      <path d="M740 590H350" stroke="url(#beamViolet)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="420" cy="540" r="4" fill="#0891b2" fill-opacity="0.8" filter="url(#dotGlow)"/>
      <circle cx="350" cy="590" r="3.5" fill="#5b21b6" fill-opacity="0.75" filter="url(#dotGlow)"/>
      <circle cx="480" cy="640" r="3" fill="#ea580c" fill-opacity="0.7" filter="url(#dotGlow)"/>
      <circle cx="300" cy="690" r="3.5" fill="#0891b2" fill-opacity="0.65" filter="url(#dotGlow)"/>
      <circle cx="520" cy="740" r="2.5" fill="#5b21b6" fill-opacity="0.6" filter="url(#dotGlow)"/>
      <circle cx="320" cy="460" r="3.5" fill="#0891b2" fill-opacity="0.7" class="twinkle" filter="url(#dotGlow)"/>
      <circle cx="250" cy="520" r="3" fill="#5b21b6" fill-opacity="0.65" class="twinkle-offset" filter="url(#dotGlow)"/>
      <circle cx="380" cy="720" r="2.8" fill="#ea580c" fill-opacity="0.6" class="twinkle-slow" filter="url(#dotGlow)"/>
      <circle cx="200" cy="620" r="3" fill="#0891b2" fill-opacity="0.55" class="twinkle" filter="url(#dotGlow)"/>
      <path d="M900 440H1050" stroke="#0891b2" stroke-opacity="0.4" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M950 410H1100" stroke="#5b21b6" stroke-opacity="0.35" stroke-width="1.0" stroke-linecap="round"/>
      <circle cx="1050" cy="440" r="2.5" fill="#0891b2" fill-opacity="0.5" class="twinkle-offset" filter="url(#dotGlow)"/>
      <circle cx="1100" cy="410" r="2" fill="#5b21b6" fill-opacity="0.4" filter="url(#dotGlow)"/>
    </g>

    <!-- Electricity / spark arcs -->
    <g>
      <path d="M720 560L700 555L710 548L690 540" stroke="#0891b2" stroke-opacity="0.7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M725 620L705 625L715 632L695 638" stroke="#5b21b6" stroke-opacity="0.6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M730 700L712 695L720 688L700 682" stroke="#ea580c" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Server halo -->
    <ellipse cx="976" cy="680" rx="260" ry="250" fill="url(#serverHalo)"/>

    <!-- Server rack -->
    <g mask="url(#serverMask)">
      <g transform="translate(740 460)">
        <rect x="48" y="14" width="370" height="500" rx="6" fill="none" stroke="#5b21b6" stroke-opacity="0.2" stroke-width="1.0"/>
        <rect x="14" y="0" width="370" height="500" rx="6" fill="none" stroke="url(#rackStroke)" stroke-width="3.0"/>

        <!-- Bay 1 -->
        <rect x="30" y="24" width="338" height="78" rx="4" fill="none" stroke="#0891b2" stroke-opacity="0.55" stroke-width="1.4"/>
        <path d="M128 58H280" stroke="#0891b2" stroke-opacity="0.85" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M128 68H242" stroke="#0891b2" stroke-opacity="0.45" stroke-width="1.3" stroke-linecap="round"/>
        <g filter="url(#dotGlow)">
          <circle cx="316" cy="46" r="3" fill="#0891b2" fill-opacity="1.0" class="twinkle"/>
          <circle cx="330" cy="46" r="3" fill="#5b21b6" fill-opacity="0.85"/>
          <circle cx="344" cy="46" r="3" fill="#0891b2" fill-opacity="0.5"/>
        </g>
        <rect x="306" y="68" width="9" height="4.5" rx="1" fill="none" stroke="#0891b2" stroke-opacity="0.5" stroke-width="0.7"/>
        <rect x="320" y="68" width="9" height="4.5" rx="1" fill="none" stroke="#5b21b6" stroke-opacity="0.4" stroke-width="0.7"/>
        <rect x="334" y="68" width="9" height="4.5" rx="1" fill="none" stroke="#94a3b8" stroke-opacity="0.35" stroke-width="0.7"/>

        <!-- Bay 2 -->
        <rect x="30" y="118" width="338" height="78" rx="4" fill="none" stroke="#5b21b6" stroke-opacity="0.5" stroke-width="1.4"/>
        <path d="M128 152H296" stroke="#5b21b6" stroke-opacity="0.8" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M128 162H226" stroke="#5b21b6" stroke-opacity="0.4" stroke-width="1.3" stroke-linecap="round"/>
        <g filter="url(#dotGlow)">
          <circle cx="316" cy="140" r="3" fill="#0891b2" fill-opacity="0.65"/>
          <circle cx="330" cy="140" r="3" fill="#5b21b6" fill-opacity="1.0" class="twinkle"/>
          <circle cx="344" cy="140" r="3" fill="#0891b2" fill-opacity="0.4"/>
        </g>
        <rect x="306" y="162" width="9" height="4.5" rx="1" fill="none" stroke="#5b21b6" stroke-opacity="0.4" stroke-width="0.7"/>
        <rect x="320" y="162" width="9" height="4.5" rx="1" fill="none" stroke="#0891b2" stroke-opacity="0.35" stroke-width="0.7"/>
        <rect x="334" y="162" width="9" height="4.5" rx="1" fill="none" stroke="#5b21b6" stroke-opacity="0.3" stroke-width="0.7"/>

        <!-- Bay 3 -->
        <rect x="30" y="212" width="338" height="78" rx="4" fill="none" stroke="#ea580c" stroke-opacity="0.42" stroke-width="1.3"/>
        <path d="M128 246H264" stroke="#ea580c" stroke-opacity="0.75" stroke-width="2.0" stroke-linecap="round"/>
        <path d="M128 256H210" stroke="#ea580c" stroke-opacity="0.35" stroke-width="1.2" stroke-linecap="round"/>
        <g filter="url(#dotGlow)">
          <circle cx="316" cy="234" r="3" fill="#0891b2" fill-opacity="0.4"/>
          <circle cx="330" cy="234" r="3" fill="#5b21b6" fill-opacity="0.6"/>
          <circle cx="344" cy="234" r="3" fill="#ea580c" fill-opacity="0.95" class="twinkle-slow"/>
        </g>
        <rect x="306" y="256" width="9" height="4.5" rx="1" fill="none" stroke="#ea580c" stroke-opacity="0.38" stroke-width="0.7"/>
        <rect x="320" y="256" width="9" height="4.5" rx="1" fill="none" stroke="#94a3b8" stroke-opacity="0.25" stroke-width="0.7"/>
        <rect x="334" y="256" width="9" height="4.5" rx="1" fill="none" stroke="#ea580c" stroke-opacity="0.3" stroke-width="0.7"/>

        <!-- Bay 4 — fading -->
        <rect x="30" y="306" width="338" height="78" rx="4" fill="none" stroke="#ea580c" stroke-opacity="0.2" stroke-width="1.0"/>
        <path d="M128 340H240" stroke="#ea580c" stroke-opacity="0.35" stroke-width="1.8" stroke-linecap="round"/>
        <g filter="url(#dotGlow)" opacity="0.55">
          <circle cx="316" cy="328" r="2.5" fill="#ea580c" fill-opacity="0.45"/>
          <circle cx="330" cy="328" r="2.5" fill="#5b21b6" fill-opacity="0.35"/>
          <circle cx="344" cy="328" r="2.5" fill="#ea580c" fill-opacity="0.55"/>
        </g>

        <!-- Bay 5 — nearly gone -->
        <rect x="30" y="400" width="338" height="78" rx="4" fill="none" stroke="#ea580c" stroke-opacity="0.1" stroke-width="0.8"/>
        <path d="M128 434H200" stroke="#ea580c" stroke-opacity="0.15" stroke-width="1.4" stroke-linecap="round"/>

        <path d="M30 488H180" stroke="url(#rackStroke)" stroke-opacity="0.22" stroke-width="1.0" stroke-linecap="round"/>
      </g>
    </g>
  </g>
</svg>
