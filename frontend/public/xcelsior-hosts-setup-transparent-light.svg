<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <!-- Grid patterns removed — were unused and made the SVG read as a technical grid on light bg. -->

    <!-- Asymmetric fade -->
    <linearGradient id="gridFadeV" x1="0" y1="0" x2="0" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="35%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.585"/>
      <stop offset="72%" stop-color="white" stop-opacity="0.216"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="gridFadeH" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.36"/>
      <stop offset="18%" stop-color="white"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="85%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.144"/>
    </linearGradient>
    <mask id="gridMask">
      <rect x="0" y="0" width="1200" height="900" fill="url(#gridFadeV)"/>
      <rect x="0" y="0" width="1200" height="900" fill="url(#gridFadeH)" style="mix-blend-mode:multiply"/>
    </mask>

    <!-- Accent line gradients -->
    <linearGradient id="brandH" x1="60" y1="0" x2="1140" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.0"/>
      <stop offset="12%" stop-color="#0891b2" stop-opacity="0.95"/>
      <stop offset="48%" stop-color="#6d28d9" stop-opacity="1.0"/>
      <stop offset="82%" stop-color="#c2410c" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="brandV" x1="0" y1="30" x2="0" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="1.0"/>
      <stop offset="40%" stop-color="#6d28d9" stop-opacity="0.95"/>
      <stop offset="75%" stop-color="#c2410c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.0"/>
    </linearGradient>

    <!-- Server defs -->
    <linearGradient id="rackStroke" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="1.0"/>
      <stop offset="50%" stop-color="#6d28d9" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.95"/>
    </linearGradient>
    <!-- Server halo: muted on light bg so it doesn't bloom into the traces -->
    <radialGradient id="serverHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 680) rotate(90) scale(280 260)">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#0891b2" stop-opacity="0.025"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="serverMaskG" x1="740" y1="420" x2="1180" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="white" stop-opacity="0.75"/>
      <stop offset="75%" stop-color="white" stop-opacity="0.54"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.0"/>
    </linearGradient>
    <mask id="serverMask">
      <rect x="0" y="0" width="1200" height="900" fill="black"/>
      <rect x="690" y="380" width="520" height="520" rx="8" fill="url(#serverMaskG)"/>
    </mask>

    <!-- Reduced glow radius + stdDeviation for light bg (was 7, now 4) so
         halos don't bloom into white background and wash out trace detail. -->
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Fade mask for top and left edges -->
    <linearGradient id="edgeFadeLeft" x1="0" y1="0" x2="125" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="white" stop-opacity="1.0"/>
    </linearGradient>
    <linearGradient id="edgeFadeTop" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="white" stop-opacity="1.0"/>
    </linearGradient>
    <mask id="edgeFadeMask">
      <rect x="0" y="0" width="1200" height="900" fill="white"/>
      <rect x="0" y="0" width="125" height="900" fill="url(#edgeFadeLeft)"/>
      <rect x="0" y="0" width="1200" height="100" fill="url(#edgeFadeTop)"/>
    </mask>

    <!-- Circuit trace gradients — starts at 0.4 opacity (not 0) so traces read strongly on light bg -->
    <linearGradient id="traceCyan" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.4"/>
      <stop offset="20%" stop-color="#0e7490" stop-opacity="1.0"/>
      <stop offset="80%" stop-color="#0e7490" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="traceViolet" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#5b21b6" stop-opacity="0.4"/>
      <stop offset="20%" stop-color="#5b21b6" stop-opacity="1.0"/>
      <stop offset="80%" stop-color="#5b21b6" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="traceRed" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#9a3412" stop-opacity="0.4"/>
      <stop offset="25%" stop-color="#9a3412" stop-opacity="1.0"/>
      <stop offset="75%" stop-color="#9a3412" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9a3412" stop-opacity="0.65"/>
    </linearGradient>

    <!-- Beam energy animation gradients — identical to dark so animation timing, direction, colors all match -->
    <linearGradient id="beamCyan" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.0"/>
      <stop offset="40%" stop-color="#0891b2" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#0891b2" stop-opacity="1.0"/>
      <stop offset="60%" stop-color="#0891b2" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;2 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="beamViolet" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.0"/>
      <stop offset="40%" stop-color="#6d28d9" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#6d28d9" stop-opacity="1.0"/>
      <stop offset="60%" stop-color="#6d28d9" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;2 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <style>
      .twinkle{animation:twinkle 3s ease-in-out infinite}
      .twinkle-slow{animation:twinkle 4.8s ease-in-out infinite}
      .twinkle-offset{animation:twinkle 3.4s ease-in-out infinite; animation-delay: 1.2s}
      @keyframes twinkle{0%,100%{opacity:1}50%{opacity:.18}}
    </style>
  </defs>

  <!-- Everything under edge fade mask — transparent background -->
  <g mask="url(#edgeFadeMask)">

    <!-- All grid lines removed for light theme prominence -->
    <g>

      <!-- Branded accent lines (all vertical grid lines removed per UX review — they read as gridlines on light bg) -->
      <g opacity="0">
      </g>
      <g opacity="0">
      </g>

      <!-- ═══════════════════════════════════════════════ -->
      <!--  CIRCUIT BOARD TRACES  (replaces dots + arcs)  -->
      <!-- ═══════════════════════════════════════════════ -->

      <!-- Trace 1 — cyan: horizontal from left, right-angle down, then right to server area -->
      <g fill="none" stroke-linecap="round" stroke-linejoin="round">
        <!-- Main traces — static base layer (widened for light-bg pop) -->
        <path d="M100 192 H460 V310 H680" stroke="url(#traceCyan)" stroke-width="2.6"/>
        <path d="M140 256 H340 V180 H520 V256 H640" stroke="url(#traceViolet)" stroke-width="2.4"/>
        <path d="M180 352 H380 V420 H560 V352 H720" stroke="url(#traceRed)" stroke-width="2.2"/>
        <path d="M200 416 H300 V480 H500" stroke="url(#traceCyan)" stroke-width="1.9"/>
        <path d="M160 140 H280 V96 H440 V192 H580" stroke="url(#traceViolet)" stroke-width="1.9"/>
        <path d="M240 480 H420 V540 H600 V480 H700" stroke="url(#traceRed)" stroke-width="1.7"/>
      </g>

      <!-- Branch connectors and IC-style hollow pads removed — their short
           vertical stubs read as a technical grid on light bg. Keeping only
           the 6 main gradient-stroked traces for a cleaner circuit motif. -->

      <!-- Endpoint pads — filled circles at trace terminations -->
      <g filter="url(#dotGlow)">
        <!-- Cyan trace endpoints -->
        <circle cx="680" cy="310" r="4.5" fill="#0891b2" fill-opacity="0.8" class="twinkle"/>
        <circle cx="500" cy="480" r="3.5" fill="#0891b2" fill-opacity="0.78"/>
        <circle cx="460" cy="160" r="3" fill="#0891b2" fill-opacity="0.65"/>
        <!-- Violet trace endpoints -->
        <circle cx="640" cy="256" r="4.5" fill="#6d28d9" fill-opacity="0.75" class="twinkle-offset"/>
        <circle cx="580" cy="192" r="4" fill="#6d28d9" fill-opacity="0.78"/>
        <circle cx="440" cy="70" r="3" fill="#6d28d9" fill-opacity="0.65"/>
        <!-- Red trace endpoints -->
        <circle cx="720" cy="352" r="4" fill="#c2410c" fill-opacity="0.845"/>
        <circle cx="700" cy="480" r="3.5" fill="#c2410c" fill-opacity="0.715"/>
        <circle cx="600" cy="570" r="3" fill="#c2410c" fill-opacity="0.585"/>
      </g>

      <!-- Beam energy animations — two traces get a moving highlight -->
      <path d="M100 192 H460 V310 H680" stroke="url(#beamCyan)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
      <path d="M140 256 H340 V180 H520 V256 H640" stroke="url(#beamViolet)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
    </g>
  </g>

  <!-- Server halo — dimmed (0.05/0.025/0) for light bg so it doesn't dominate the traces -->
  <ellipse cx="976" cy="680" rx="260" ry="250" fill="url(#serverHalo)"/>

  <!-- Server rack -->
  <g mask="url(#serverMask)">
    <g transform="translate(740 460)">
      <rect x="48" y="14" width="370" height="500" rx="6" fill="none" stroke="#6d28d9" stroke-opacity="0.27" stroke-width="1.1"/>
      <rect x="14" y="0" width="370" height="500" rx="6" fill="none" stroke="url(#rackStroke)" stroke-width="2.6"/>

      <!-- Bay 1 -->
      <rect x="30" y="24" width="338" height="78" rx="4" fill="none" stroke="#0891b2" stroke-opacity="0.78" stroke-width="1.3"/>
      <path d="M128 58H280" stroke="#0891b2" stroke-opacity="0.9" stroke-width="2.1" stroke-linecap="round"/>
      <path d="M128 68H242" stroke="#0891b2" stroke-opacity="0.65" stroke-width="1.3" stroke-linecap="round"/>
      <g filter="url(#dotGlow)">
        <circle cx="316" cy="46" r="2.5" fill="#0891b2" fill-opacity="0.9" class="twinkle"/>
        <circle cx="330" cy="46" r="2.5" fill="#6d28d9" fill-opacity="0.7"/>
        <circle cx="344" cy="46" r="2.5" fill="#0891b2" fill-opacity="0.63"/>
      </g>
      <rect x="306" y="68" width="9" height="4.5" rx="1" fill="none" stroke="#0891b2" stroke-opacity="0.63" stroke-width="0.5"/>
      <rect x="320" y="68" width="9" height="4.5" rx="1" fill="none" stroke="#6d28d9" stroke-opacity="0.504" stroke-width="0.5"/>
      <rect x="334" y="68" width="9" height="4.5" rx="1" fill="none" stroke="#64748B" stroke-opacity="0.36" stroke-width="0.5"/>

      <!-- Bay 2 -->
      <rect x="30" y="118" width="338" height="78" rx="4" fill="none" stroke="#6d28d9" stroke-opacity="0.715" stroke-width="1.3"/>
      <path d="M128 152H296" stroke="#6d28d9" stroke-opacity="0.85" stroke-width="2.1" stroke-linecap="round"/>
      <path d="M128 162H226" stroke="#6d28d9" stroke-opacity="0.585" stroke-width="1.3" stroke-linecap="round"/>
      <g filter="url(#dotGlow)">
        <circle cx="316" cy="140" r="2.5" fill="#0891b2" fill-opacity="0.65"/>
        <circle cx="330" cy="140" r="2.5" fill="#6d28d9" fill-opacity="0.85" class="twinkle"/>
        <circle cx="344" cy="140" r="2.5" fill="#0891b2" fill-opacity="0.55"/>
      </g>
      <rect x="306" y="162" width="9" height="4.5" rx="1" fill="none" stroke="#6d28d9" stroke-opacity="0.504" stroke-width="0.5"/>
      <rect x="320" y="162" width="9" height="4.5" rx="1" fill="none" stroke="#0891b2" stroke-opacity="0.396" stroke-width="0.5"/>
      <rect x="334" y="162" width="9" height="4.5" rx="1" fill="none" stroke="#6d28d9" stroke-opacity="0.36" stroke-width="0.5"/>

      <!-- Bay 3 -->
      <rect x="30" y="212" width="338" height="78" rx="4" fill="none" stroke="#c2410c" stroke-opacity="0.624" stroke-width="1.3"/>
      <path d="M128 246H264" stroke="#c2410c" stroke-opacity="0.78" stroke-width="2.1" stroke-linecap="round"/>
      <path d="M128 256H210" stroke="#c2410c" stroke-opacity="0.52" stroke-width="1.3" stroke-linecap="round"/>
      <g filter="url(#dotGlow)">
        <circle cx="316" cy="234" r="2.5" fill="#0891b2" fill-opacity="0.55"/>
        <circle cx="330" cy="234" r="2.5" fill="#6d28d9" fill-opacity="0.585"/>
        <circle cx="344" cy="234" r="2.5" fill="#c2410c" fill-opacity="0.8" class="twinkle-slow"/>
      </g>
      <rect x="306" y="256" width="9" height="4.5" rx="1" fill="none" stroke="#c2410c" stroke-opacity="0.45" stroke-width="0.5"/>
      <rect x="320" y="256" width="9" height="4.5" rx="1" fill="none" stroke="#64748B" stroke-opacity="0.27" stroke-width="0.5"/>
      <rect x="334" y="256" width="9" height="4.5" rx="1" fill="none" stroke="#c2410c" stroke-opacity="0.324" stroke-width="0.5"/>

      <!-- Bay 4 — fading -->
      <rect x="30" y="306" width="338" height="78" rx="4" fill="none" stroke="#c2410c" stroke-opacity="0.55" stroke-width="1.1"/>
      <path d="M128 340H240" stroke="#c2410c" stroke-opacity="0.7" stroke-width="1.8" stroke-linecap="round"/>
      <g filter="url(#dotGlow)">
        <circle cx="316" cy="328" r="2.5" fill="#c2410c" fill-opacity="0.55"/>
        <circle cx="330" cy="328" r="2.5" fill="#6d28d9" fill-opacity="0.55"/>
        <circle cx="344" cy="328" r="2.5" fill="#c2410c" fill-opacity="0.55"/>
      </g>

      <!-- Bay 5 — barely visible -->
      <rect x="30" y="400" width="338" height="78" rx="4" fill="none" stroke="#c2410c" stroke-opacity="0.45" stroke-width="1.0"/>
      <path d="M128 434H200" stroke="#c2410c" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="round"/>

      <path d="M30 488H180" stroke="url(#rackStroke)" stroke-opacity="0.27" stroke-width="1.1" stroke-linecap="round"/>
    </g>
  </g>
</svg>
