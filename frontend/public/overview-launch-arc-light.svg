<svg xmlns="http://www.w3.org/2000/svg" width="440" height="360" viewBox="0 0 440 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="24" y1="20" x2="420" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#FFF8F6"/>
      <stop offset="100%" stop-color="#FFF1EE"/>
    </linearGradient>
    <radialGradient id="gC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(102 74) rotate(90) scale(170 220)">
      <stop offset="0%" stop-color="#0891B2" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0891B2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gR" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(314 116) rotate(90) scale(180 220)">
      <stop offset="0%" stop-color="#EA580C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EA580C" stop-opacity="0"/>
    </radialGradient>
    <pattern id="majorGrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#94A3B8" stroke-opacity="0.18" stroke-width="0.6"/>
    </pattern>
    <pattern id="minorGrid" width="17" height="17" patternUnits="userSpaceOnUse">
      <path d="M17 0H0V17" stroke="#CBD5E1" stroke-opacity="0.16" stroke-width="0.45"/>
    </pattern>
    <linearGradient id="gridFade" x1="220" y1="0" x2="220" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.88"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.44"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="gridMask">
      <rect width="440" height="360" fill="url(#gridFade)"/>
    </mask>
    <linearGradient id="brandH" x1="18" y1="0" x2="422" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891B2" stop-opacity="0"/>
      <stop offset="22%" stop-color="#0891B2" stop-opacity="0.42"/>
      <stop offset="54%" stop-color="#5B21B6" stop-opacity="0.28"/>
      <stop offset="84%" stop-color="#EA580C" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#EA580C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brandV" x1="0" y1="16" x2="0" y2="344" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891B2" stop-opacity="0.42"/>
      <stop offset="52%" stop-color="#5B21B6" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#EA580C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="56" y1="74" x2="426" y2="206" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F766E" stop-opacity="0.82"/>
      <stop offset="34%" stop-color="#0891B2" stop-opacity="0.76"/>
      <stop offset="74%" stop-color="#5B21B6" stop-opacity="0.74"/>
      <stop offset="100%" stop-color="#EA580C" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="arcWarm" x1="126" y1="116" x2="436" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EA580C" stop-opacity="0.76"/>
      <stop offset="50%" stop-color="#5B21B6" stop-opacity="0.54"/>
      <stop offset="100%" stop-color="#0891B2" stop-opacity="0.42"/>
    </linearGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="arcGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .tw{animation:tw 3.2s ease-in-out infinite}
      .tw2{animation:tw 5.4s ease-in-out infinite}
      .tw3{animation:tw 4.2s ease-in-out infinite}
      .landing{animation:landing 4.4s ease-in-out infinite}
      .energy{fill:none;stroke-linecap:round;stroke-dasharray:120 820;animation:flow 11s linear infinite}
      @keyframes tw{0%,100%{opacity:1}50%{opacity:.18}}
      @keyframes landing{0%,100%{opacity:1}50%{opacity:.16}}
      @keyframes flow{from{stroke-dashoffset:940}to{stroke-dashoffset:0}}
    </style>
  </defs>

  <rect width="440" height="360" rx="20" fill="url(#bg)"/>
  <rect width="440" height="360" rx="20" fill="url(#gC)"/>
  <rect width="440" height="360" rx="20" fill="url(#gR)"/>

  <g mask="url(#gridMask)">
    <rect width="440" height="360" fill="url(#majorGrid)" opacity="0.76"/>
    <rect width="440" height="360" fill="url(#minorGrid)" opacity="0.7"/>
    <g opacity="0.66">
      <path d="M18 74H422" stroke="url(#brandH)" stroke-width="0.9"/>
      <path d="M18 146H422" stroke="url(#brandH)" stroke-width="1.1"/>
      <path d="M18 220H422" stroke="url(#brandH)" stroke-width="0.9"/>
      <path d="M18 292H422" stroke="url(#brandH)" stroke-width="0.7"/>
    </g>
    <g opacity="0.58">
      <path d="M72 16V344" stroke="url(#brandV)" stroke-width="0.7"/>
      <path d="M152 16V344" stroke="url(#brandV)" stroke-width="0.95"/>
      <path d="M234 16V344" stroke="url(#brandV)" stroke-width="1.15"/>
      <path d="M322 16V344" stroke="url(#brandV)" stroke-width="0.85"/>
      <path d="M396 16V344" stroke="url(#brandV)" stroke-width="0.65"/>
    </g>
  </g>

  <g filter="url(#glow)" opacity="0.82">
    <circle cx="56" cy="76" r="3.1" fill="#0891B2" class="tw"/>
    <circle cx="92" cy="188" r="3.1" fill="#5B21B6" class="tw2"/>
    <circle cx="154" cy="254" r="3.1" fill="#0F766E" class="tw3"/>
    <circle cx="238" cy="212" r="3.1" fill="#5B21B6" class="tw2"/>
    <circle cx="312" cy="98" r="3.1" fill="#EA580C" class="tw"/>
    <circle cx="386" cy="72" r="3.2" fill="#0891B2" class="tw3"/>
    <circle cx="406" cy="210" r="3.2" fill="#EA580C" class="landing"/>
  </g>

  <g fill="none" stroke-linecap="round" filter="url(#arcGlow)">
    <path d="M56 76 Q90 86 126 116" stroke="url(#arcGrad)" stroke-width="1.7" stroke-opacity="0.62"/>
    <path d="M92 188 Q112 146 126 116" stroke="#5B21B6" stroke-width="1.55" stroke-opacity="0.5"/>
    <path d="M154 254 Q144 184 126 116" stroke="#0F766E" stroke-width="1.45" stroke-opacity="0.46"/>
    <path d="M126 116 Q248 14 438 76" stroke="url(#arcWarm)" stroke-width="2.3" stroke-opacity="0.8"/>
    <path d="M126 116 Q236 126 420 212" stroke="url(#arcGrad)" stroke-width="1.9" stroke-opacity="0.6"/>
    <path d="M126 116 Q212 178 332 314" stroke="url(#arcGrad)" stroke-width="1.6" stroke-opacity="0.36"/>
    <path class="energy" d="M126 116 Q248 14 438 76" stroke="url(#arcWarm)" stroke-width="2.8" stroke-opacity="0.84"/>
    <path class="energy" d="M126 116 Q236 126 420 212" stroke="url(#arcGrad)" stroke-width="2.2" stroke-opacity="0.68" style="animation-delay:4s;animation-duration:14s"/>
  </g>

  <g filter="url(#glow)">
    <line x1="126" y1="116" x2="126" y2="82" stroke="#EA580C" stroke-width="1.2" stroke-opacity="0.56" stroke-linecap="round"/>
    <line x1="126" y1="116" x2="150" y2="96" stroke="#EA580C" stroke-width="0.9" stroke-opacity="0.34" stroke-linecap="round"/>
    <line x1="126" y1="116" x2="102" y2="96" stroke="#0891B2" stroke-width="0.9" stroke-opacity="0.28" stroke-linecap="round"/>
    <line x1="126" y1="116" x2="152" y2="136" stroke="#5B21B6" stroke-width="0.8" stroke-opacity="0.22" stroke-linecap="round"/>
    <line x1="126" y1="116" x2="102" y2="138" stroke="#0F766E" stroke-width="0.8" stroke-opacity="0.2" stroke-linecap="round"/>
  </g>
  <circle cx="126" cy="116" r="5.2" fill="#EA580C" fill-opacity="0.82" filter="url(#glow)" class="landing"/>
  <circle cx="126" cy="116" r="3.2" fill="#EA580C" opacity="0.94"/>
  <circle cx="126" cy="116" r="18" fill="none" stroke="#EA580C" stroke-opacity="0.14" stroke-width="0.8"/>
  <circle cx="126" cy="116" r="34" fill="none" stroke="#5B21B6" stroke-opacity="0.08" stroke-width="0.7"/>
  <circle cx="126" cy="116" r="52" fill="none" stroke="#0891B2" stroke-opacity="0.05" stroke-width="0.6"/>
</svg>
