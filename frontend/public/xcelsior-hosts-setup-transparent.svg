      <stop offset="0%" stop-color="#0F1D32" stop-opacity="0.76"/><stop offset="100%" stop-color="#2A123B" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="isoSide" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0E2438" stop-opacity="0.32"/><stop offset="100%" stop-color="#1B1033" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="isoStroke" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
