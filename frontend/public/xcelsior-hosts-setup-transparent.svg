<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38dbff"/>
      <stop offset="62%" stop-color="#9b6dff"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="panel" x1="70" y1="70" x2="220" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#152033"/>
      <stop offset="52%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#06111c"/>
    </linearGradient>
    <linearGradient id="bay" x1="90" y1="94" x2="200" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111b2e"/>
      <stop offset="100%" stop-color="#08111d"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#38dbff" stop-opacity="0.55"/>
      <stop offset="42%" stop-color="#9b6dff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06111c"/>
    </radialGradient>
    <linearGradient id="glassHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="depth" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#38dbff" flood-opacity="0.48"/>
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#9b6dff" flood-opacity="0.28"/>
    </filter>
    <filter id="bloom" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <circle cx="120" cy="100" r="100" fill="#38dbff" filter="url(#bloom)" opacity="0.12"/>
  <circle cx="380" cy="280" r="90" fill="#34d399" filter="url(#bloom)" opacity="0.1"/>

  <!-- server tower -->
  <g filter="url(#depth)">
    <rect x="70" y="70" width="150" height="220" rx="16" fill="url(#panel)" stroke="url(#brand)" stroke-width="2.4"/>
    <rect x="70" y="70" width="150" height="220" rx="16" fill="url(#glassHi)"/>
    <path d="M145 70v220M70 90l75 12 75-12" stroke="#38dbff" stroke-opacity="0.32" stroke-width="2"/>
    <g>
      <rect x="90" y="94" width="110" height="40" rx="8" fill="url(#bay)" stroke="#38dbff" stroke-opacity="0.32"/>
      <rect x="90" y="146" width="110" height="40" rx="8" fill="url(#bay)" stroke="#38dbff" stroke-opacity="0.32"/>
      <rect x="90" y="198" width="110" height="40" rx="8" fill="url(#bay)" stroke="#38dbff" stroke-opacity="0.32"/>
      <circle cx="106" cy="114" r="4.5" fill="#34d399"/>
      <circle cx="106" cy="166" r="4.5" fill="#34d399"/>
      <circle cx="106" cy="218" r="4.5" fill="#38dbff"/>
      <g stroke="#38dbff" stroke-width="4" stroke-linecap="round" opacity="0.85">
        <path d="M124 114H190"/>
        <path d="M124 166H190"/>
        <path d="M124 218H178"/>
      </g>
    </g>
    <path d="M82 296c24 8 64 8 88 0" stroke="#38dbff" stroke-opacity="0.38" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- network fabric to a node -->
  <g stroke="url(#brand)" stroke-width="2" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M220 150H300V210H360"/>
    <path d="M220 210H264V120H320"/>
  </g>
  <circle cx="300" cy="150" r="4" fill="#9b6dff"/>
  <circle cx="264" cy="210" r="4" fill="#38dbff"/>

  <g filter="url(#depth)" transform="translate(360,210)">
    <rect x="-34" y="-30" width="68" height="60" rx="12" fill="url(#panel)" stroke="url(#brand)" stroke-width="2"/>
    <rect x="-34" y="-30" width="68" height="60" rx="12" fill="url(#glassHi)"/>
    <rect x="-20" y="-16" width="40" height="32" rx="6" fill="url(#core)" opacity="0.85"/>
    <path d="M88 52 78 72h9l-4 19 17-27h-9l4-12h-7Z" transform="translate(-24,-8) scale(0.55)" fill="#38dbff" fill-opacity="0.18" stroke="#38dbff" stroke-width="1.5"/>
    <g stroke="#38dbff" stroke-opacity="0.35" stroke-width="1">
      <path d="M-7 -16V16M7 -16V16M-20 0H20"/>
    </g>
  </g>
</svg>