<svg xmlns="http://www.w3.org/2000/svg" width="440" height="360" viewBox="0 0 440 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="440" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#FFF8F6"/>
      <stop offset="100%" stop-color="#FFF1EE"/>
    </linearGradient>
    <radialGradient id="gR" cx="0.7" cy="0.4" r="0.65" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ea580c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gC" cx="0.25" cy="0.6" r="0.6" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#94a3b8" stroke-opacity="0.18" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="gridFade" x1="0" y1="0" x2="440" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="gm"><rect width="440" height="360" fill="url(#gridFade)"/></mask>
    <linearGradient id="brandH" x1="0" y1="0" x2="440" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0891b2" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#ea580c" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brandV" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#5b21b6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="trail" x1="280" y1="100" x2="280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ea580c" stop-opacity="0.65"/>
      <stop offset="40%" stop-color="#5b21b6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="arcGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .tw{animation:tw 3s ease-in-out infinite}
      .tw2{animation:tw 4.8s ease-in-out infinite}
      .tw3{animation:tw 2.4s ease-in-out infinite}
      .tw4{animation:tw 5.5s ease-in-out infinite}
      .tw5{animation:tw 3.6s ease-in-out infinite}
      @keyframes tw{0%,100%{opacity:1}50%{opacity:.16}}
    </style>
  </defs>

  <rect width="440" height="360" rx="20" fill="url(#bg)"/>
  <rect width="440" height="360" rx="20" fill="url(#gR)"/>
  <rect width="440" height="360" rx="20" fill="url(#gC)"/>

  <g mask="url(#gm)">
    <rect width="440" height="360" fill="url(#grid)" opacity="0.65"/>
    <g opacity="0.6">
      <path d="M20 80H420" stroke="url(#brandH)" stroke-width="0.8"/>
      <path d="M20 160H420" stroke="url(#brandH)" stroke-width="1.2"/>
      <path d="M20 240H420" stroke="url(#brandH)" stroke-width="0.8"/>
    </g>
    <g opacity="0.5">
      <path d="M100 10V350" stroke="url(#brandV)" stroke-width="0.8"/>
      <path d="M200 10V350" stroke="url(#brandV)" stroke-width="1.2"/>
      <path d="M300 10V350" stroke="url(#brandV)" stroke-width="0.8"/>
      <path d="M380 10V350" stroke="url(#brandV)" stroke-width="0.6"/>
    </g>
  </g>

  <g filter="url(#glow)" opacity="0.7">
    <circle cx="100" cy="80" r="3" fill="#0891b2" class="tw"/>
    <circle cx="200" cy="160" r="3" fill="#5b21b6" class="tw2"/>
    <circle cx="300" cy="80" r="3" fill="#ea580c" class="tw4"/>
    <circle cx="380" cy="240" r="3" fill="#ea580c" class="tw5"/>
    <circle cx="100" cy="240" r="3" fill="#0f766e" class="tw3"/>
  </g>

  <g opacity="0.4" fill="none" stroke-width="1.4" stroke-linecap="round" filter="url(#arcGlow)">
    <path d="M100 80 Q150 50 200 160" stroke="#0891b2"/>
    <path d="M200 160 Q250 100 300 80" stroke="#5b21b6"/>
    <path d="M300 80 Q340 140 380 240" stroke="#ea580c"/>
    <path d="M100 240 Q150 180 200 160" stroke="#0f766e"/>
  </g>

  <path d="M280 100 Q285 160 290 240 Q292 280 288 320" stroke="url(#trail)" stroke-width="2.4" stroke-linecap="round" fill="none" filter="url(#arcGlow)"/>
  <path d="M276 100 Q270 170 264 260" stroke="url(#trail)" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5" filter="url(#arcGlow)"/>
  <path d="M284 100 Q295 165 306 250" stroke="url(#trail)" stroke-width="1.0" stroke-linecap="round" fill="none" opacity="0.4" filter="url(#arcGlow)"/>

  <g filter="url(#glow)">
    <line x1="280" y1="100" x2="280" y2="72" stroke="#ea580c" stroke-width="1.2" stroke-opacity="0.55" stroke-linecap="round"/>
    <line x1="280" y1="100" x2="300" y2="82" stroke="#ea580c" stroke-width="0.8" stroke-opacity="0.35" stroke-linecap="round"/>
    <line x1="280" y1="100" x2="260" y2="82" stroke="#ea580c" stroke-width="0.8" stroke-opacity="0.35" stroke-linecap="round"/>
    <line x1="280" y1="100" x2="300" y2="118" stroke="#5b21b6" stroke-width="0.6" stroke-opacity="0.25" stroke-linecap="round"/>
    <line x1="280" y1="100" x2="260" y2="118" stroke="#0891b2" stroke-width="0.6" stroke-opacity="0.25" stroke-linecap="round"/>
  </g>
  <circle cx="280" cy="100" r="5" fill="#ea580c" fill-opacity="0.8" filter="url(#glow)" class="tw3"/>
  <circle cx="280" cy="100" r="3" fill="#ea580c" opacity="0.9"/>

  <circle cx="280" cy="100" r="18" fill="none" stroke="#ea580c" stroke-opacity="0.12" stroke-width="0.8"/>
  <circle cx="280" cy="100" r="32" fill="none" stroke="#ea580c" stroke-opacity="0.06" stroke-width="0.6"/>
  <circle cx="280" cy="100" r="50" fill="none" stroke="#5b21b6" stroke-opacity="0.04" stroke-width="0.5"/>
</svg>
