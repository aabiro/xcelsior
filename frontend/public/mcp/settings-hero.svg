<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" fill="none">
  <defs>
    <linearGradient id="sh-edge" x1="40" y1="40" x2="300" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38dbff"></stop>
      <stop offset=".6" stop-color="#9b6dff"></stop>
      <stop offset="1" stop-color="#34d399"></stop>
    </linearGradient>
    <linearGradient id="sh-edge2" x1="680" y1="40" x2="860" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38dbff"></stop>
      <stop offset=".55" stop-color="#9b6dff"></stop>
      <stop offset="1" stop-color="#34d399"></stop>
    </linearGradient>
    <linearGradient id="sh-line" x1="200" y1="80" x2="820" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38dbff"></stop>
      <stop offset=".5" stop-color="#9b6dff"></stop>
      <stop offset="1" stop-color="#34d399"></stop>
    </linearGradient>
    <linearGradient id="sh-body" x1="90" y1="60" x2="200" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17243d"></stop>
      <stop offset=".55" stop-color="#0c1526"></stop>
      <stop offset="1" stop-color="#070f1c"></stop>
    </linearGradient>
    <linearGradient id="sh-cardbody" x1="700" y1="50" x2="850" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17243d"></stop>
      <stop offset=".55" stop-color="#0c1526"></stop>
      <stop offset="1" stop-color="#070f1c"></stop>
    </linearGradient>
    <radialGradient id="sh-spot" cx="26%" cy="34%" r="95%">
      <stop offset="0%" stop-color="#131f36"></stop>
      <stop offset="100%" stop-color="#080d19"></stop>
    </radialGradient>
    <radialGradient id="sh-core" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#38dbff"></stop>
      <stop offset="55%" stop-color="#9b6dff" stop-opacity="0.45"></stop>
      <stop offset="100%" stop-color="#0c1526" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="sh-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38dbff" stop-opacity="0.4"></stop>
      <stop offset="100%" stop-color="#38dbff" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="sh-mcp" x1="120" y1="96" x2="168" y2="144" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7cf2ff"></stop>
      <stop offset="1" stop-color="#c4b5fd"></stop>
    </linearGradient>
    <linearGradient id="sh-gold" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#fde68a"></stop>
      <stop offset="1" stop-color="#d4a233"></stop>
    </linearGradient>
    <linearGradient id="sh-soft" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#38dbff" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#9b6dff" stop-opacity="0.05"></stop>
    </linearGradient>
    <filter id="sh-glow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#38dbff" flood-opacity="0.55"></feDropShadow>
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#9b6dff" flood-opacity="0.3"></feDropShadow>
    </filter>
    <filter id="sh-cardglow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#38dbff" flood-opacity="0.4"></feDropShadow>
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#9b6dff" flood-opacity="0.24"></feDropShadow>
    </filter>
    <filter id="sh-node" x="-160%" y="-160%" width="420%" height="420%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#38dbff" flood-opacity="0.7"></feDropShadow>
    </filter>
    <filter id="sh-bloom" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="34"></feGaussianBlur>
    </filter>
    <pattern id="sh-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#38dbff" stroke-opacity="0.05" stroke-width="1"></path>
    </pattern>
  </defs>

  <rect width="880" height="240" rx="18" fill="url(#sh-spot)"></rect>
  <rect width="880" height="240" rx="18" fill="url(#sh-grid)"></rect>
  <circle cx="120" cy="46" r="110" fill="#9b6dff" opacity="0.16" filter="url(#sh-bloom)"></circle>
  <circle cx="210" cy="230" r="100" fill="#38dbff" opacity="0.10" filter="url(#sh-bloom)"></circle>
  <circle cx="800" cy="120" r="120" fill="#34d399" opacity="0.07" filter="url(#sh-bloom)"></circle>

  
  <g stroke="url(#sh-line)" stroke-opacity="0.32" stroke-width="1.4" fill="none">
    <path d="M198 108 C 360 40, 560 46, 726 66"></path>
    <path d="M206 132 C 420 210, 600 200, 726 176"></path>
    <path d="M206 120 C 500 132, 620 128, 796 122"></path>
  </g>
  
  <circle cx="470" cy="55" r="3.2" fill="#38dbff" filter="url(#sh-node)"></circle>
  <circle cx="360" cy="60" r="2.4" fill="#9b6dff" filter="url(#sh-node)"></circle>
  <circle cx="470" cy="196" r="3.2" fill="#34d399" filter="url(#sh-node)"></circle>
  <circle cx="560" cy="126" r="3" fill="#38dbff" filter="url(#sh-node)"></circle>

  
  <g>
    <g filter="url(#sh-cardglow)"><rect x="698" y="49" width="60" height="36" rx="7" fill="url(#sh-cardbody)" stroke="url(#sh-edge2)" stroke-width="1.7"></rect></g>
    <path d="M704 55h48" stroke="#38dbff" stroke-opacity="0.28" stroke-width="1.3" stroke-linecap="round"></path>
    <circle cx="716" cy="68" r="6.4" fill="none" stroke="url(#sh-edge2)" stroke-width="1.5"></circle><circle cx="716" cy="68" r="1.9" fill="#38dbff"></circle>
    <circle cx="740" cy="68" r="6.4" fill="none" stroke="url(#sh-edge2)" stroke-width="1.5"></circle><circle cx="740" cy="68" r="1.9" fill="#38dbff"></circle>
    <rect x="715" y="80" width="26" height="3" rx="1.5" fill="url(#sh-gold)" opacity="0.9"></rect>
  </g>
  <g>
    <g filter="url(#sh-cardglow)"><rect x="768" y="104" width="60" height="36" rx="7" fill="url(#sh-cardbody)" stroke="url(#sh-edge2)" stroke-width="1.7"></rect></g>
    <path d="M774 110h48" stroke="#38dbff" stroke-opacity="0.28" stroke-width="1.3" stroke-linecap="round"></path>
    <circle cx="786" cy="123" r="6.4" fill="none" stroke="url(#sh-edge2)" stroke-width="1.5"></circle><circle cx="786" cy="123" r="1.9" fill="#9b6dff"></circle>
    <circle cx="810" cy="123" r="6.4" fill="none" stroke="url(#sh-edge2)" stroke-width="1.5"></circle><circle cx="810" cy="123" r="1.9" fill="#9b6dff"></circle>
    <rect x="785" y="135" width="26" height="3" rx="1.5" fill="url(#sh-gold)" opacity="0.9"></rect>
  </g>
  <g>
    <g filter="url(#sh-cardglow)"><rect x="698" y="159" width="60" height="36" rx="7" fill="url(#sh-cardbody)" stroke="url(#sh-edge2)" stroke-width="1.7"></rect></g>
    <path d="M704 165h48" stroke="#38dbff" stroke-opacity="0.28" stroke-width="1.3" stroke-linecap="round"></path>
    <circle cx="716" cy="178" r="6.4" fill="none" stroke="url(#sh-edge2)" stroke-width="1.5"></circle><circle cx="716" cy="178" r="1.9" fill="#34d399"></circle>
    <circle cx="740" cy="178" r="6.4" fill="none" stroke="url(#sh-edge2)" stroke-width="1.5"></circle><circle cx="740" cy="178" r="1.9" fill="#34d399"></circle>
    <rect x="715" y="190" width="26" height="3" rx="1.5" fill="url(#sh-gold)" opacity="0.9"></rect>
  </g>

  
  <circle cx="144" cy="120" r="104" fill="url(#sh-halo)"></circle>
  <ellipse cx="144" cy="120" rx="92" ry="62" fill="none" stroke="url(#sh-edge)" stroke-width="1.2" opacity="0.3"></ellipse>
  <g transform="translate(144,120)">
    <polygon points="0,-84 73,-42 73,42 0,84 -73,42 -73,-42" fill="none" stroke="url(#sh-edge)" stroke-opacity="0.24" stroke-width="1.5"></polygon>
    <polygon points="0,-66 57,-33 57,33 0,66 -57,33 -57,-33" fill="url(#sh-core)"></polygon>
    <polygon points="0,-58 50,-29 50,29 0,58 -50,29 -50,-29" fill="url(#sh-body)" stroke="url(#sh-edge)" stroke-width="2.2" filter="url(#sh-glow)"></polygon>
    <polygon points="0,-34 29,-17 29,17 0,34 -29,17 -29,-17" fill="none" stroke="#7cf2ff" stroke-opacity="0.45" stroke-width="1.4"></polygon>
    <text x="0" y="8" text-anchor="middle" fill="url(#sh-mcp)" font-family="ui-monospace,SFMono-Regular,monospace" font-size="20" font-weight="700" letter-spacing="1">MCP</text>
  </g>
  
  <circle cx="236" cy="120" r="5" fill="#38dbff" filter="url(#sh-node)"></circle>
  <circle cx="52" cy="120" r="5" fill="#34d399" filter="url(#sh-node)"></circle>

  
  <text x="300" y="118" fill="#eafcff" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="34" font-weight="800" letter-spacing="-0.5">Connect AI Agents</text>
  <text x="302" y="152" fill="#9fb3c8" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="18" font-weight="500">Natural language to real GPUs, in seconds</text>

  <rect x="0.5" y="0.5" width="879" height="239" rx="17.5" fill="url(#sh-soft)" stroke="#38dbff" stroke-opacity="0.14"></rect>
</svg>