<svg xmlns="http://www.w3.org/2000/svg" width="440" height="360" viewBox="0 0 440 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="440" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#F5FAFF"/>
      <stop offset="100%" stop-color="#F3F0FF"/>
    </linearGradient>
    <radialGradient id="gC" cx="0.3" cy="0.35" r="0.65" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gV" cx="0.7" cy="0.6" r="0.55" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#94a3b8" stroke-opacity="0.18" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="gridFade" x1="440" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="gm"><rect width="440" height="360" fill="url(#gridFade)"/></mask>
    <linearGradient id="brandH" x1="0" y1="0" x2="440" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0"/>
      <stop offset="30%" stop-color="#0891b2" stop-opacity="0.45"/>
      <stop offset="65%" stop-color="#5b21b6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brandV" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#5b21b6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arcG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="arcGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .tw{animation:tw 3s ease-in-out infinite}
      .tw2{animation:tw 4.8s ease-in-out infinite}
      .tw3{animation:tw 2.4s ease-in-out infinite}
      .tw4{animation:tw 5.5s ease-in-out infinite}
      .tw5{animation:tw 3.6s ease-in-out infinite}
      .tw6{animation:tw 6.2s ease-in-out infinite}
      .energy{fill:none;stroke-linecap:round;stroke-dasharray:80 400;animation:flow 10s linear infinite}
      @keyframes tw{0%,100%{opacity:1}50%{opacity:.16}}
      @keyframes flow{from{stroke-dashoffset:480}to{stroke-dashoffset:0}}
    </style>
  </defs>

  <rect width="440" height="360" rx="20" fill="url(#bg)"/>
  <rect width="440" height="360" rx="20" fill="url(#gC)"/>
  <rect width="440" height="360" rx="20" fill="url(#gV)"/>

  <g mask="url(#gm)">
    <rect width="440" height="360" fill="url(#grid)" opacity="0.65"/>
    <g opacity="0.6">
      <path d="M20 80H420" stroke="url(#brandH)" stroke-width="0.8"/>
      <path d="M20 160H420" stroke="url(#brandH)" stroke-width="1.2"/>
      <path d="M20 240H420" stroke="url(#brandH)" stroke-width="0.8"/>
      <path d="M20 310H420" stroke="url(#brandH)" stroke-width="0.6"/>
    </g>
    <g opacity="0.5">
      <path d="M60 10V350" stroke="url(#brandV)" stroke-width="0.6"/>
      <path d="M140 10V350" stroke="url(#brandV)" stroke-width="0.8"/>
      <path d="M220 10V350" stroke="url(#brandV)" stroke-width="1.2"/>
      <path d="M320 10V350" stroke="url(#brandV)" stroke-width="0.8"/>
      <path d="M400 10V350" stroke="url(#brandV)" stroke-width="0.6"/>
    </g>
  </g>

  <!-- Hub (central provider node) -->
  <g filter="url(#glow)">
    <circle cx="160" cy="160" r="7" fill="#0891b2" fill-opacity="0.75" class="tw3"/>
    <circle cx="160" cy="160" r="4" fill="#0891b2" opacity="0.9"/>
  </g>
  <circle cx="160" cy="160" r="22" fill="none" stroke="#0891b2" stroke-opacity="0.1" stroke-width="0.8"/>
  <circle cx="160" cy="160" r="40" fill="none" stroke="#0891b2" stroke-opacity="0.05" stroke-width="0.6"/>
  <circle cx="160" cy="160" r="65" fill="none" stroke="#5b21b6" stroke-opacity="0.03" stroke-width="0.5"/>

  <!-- Satellite nodes -->
  <g filter="url(#glow)" opacity="0.7">
    <circle cx="60" cy="80" r="3" fill="#0f766e" class="tw"/>
    <circle cx="80" cy="260" r="3" fill="#5b21b6" class="tw2"/>
    <circle cx="280" cy="100" r="3.5" fill="#6d28d9" class="tw4"/>
    <circle cx="320" cy="240" r="3" fill="#0891b2" class="tw5"/>
    <circle cx="220" cy="300" r="2.5" fill="#5b21b6" class="tw6"/>
    <circle cx="260" cy="60" r="2.5" fill="#0f766e" class="tw"/>
    <circle cx="400" cy="160" r="3" fill="#6d28d9" class="tw2"/>
    <circle cx="140" cy="40" r="2" fill="#0891b2" class="tw5"/>
  </g>

  <!-- Connection arcs — all flowing toward/from hub -->
  <g fill="none" stroke-linecap="round" filter="url(#arcGlow)">
    <path d="M60 80 Q100 100 160 160" stroke="#0f766e" stroke-width="1.6" stroke-opacity="0.55"/>
    <path d="M80 260 Q120 220 160 160" stroke="#5b21b6" stroke-width="1.4" stroke-opacity="0.5"/>
    <path d="M280 100 Q220 120 160 160" stroke="#6d28d9" stroke-width="1.6" stroke-opacity="0.55"/>
    <path d="M320 240 Q240 210 160 160" stroke="url(#arcG)" stroke-width="1.4" stroke-opacity="0.5"/>
    <path d="M220 300 Q190 240 160 160" stroke="#5b21b6" stroke-width="1.2" stroke-opacity="0.4"/>
    <path d="M260 60 Q210 100 160 160" stroke="#0891b2" stroke-width="1.2" stroke-opacity="0.45"/>
    <path d="M400 160 Q280 155 160 160" stroke="#6d28d9" stroke-width="1.2" stroke-opacity="0.38"/>
    <path d="M140 40 Q148 90 160 160" stroke="#0891b2" stroke-width="1.0" stroke-opacity="0.3"/>
  </g>

  <!-- Energy flow streaks -->
  <path class="energy" d="M60 80 Q100 100 160 160" stroke="#0f766e" stroke-width="2.2" stroke-opacity="0.55"/>
  <path class="energy" d="M280 100 Q220 120 160 160" stroke="#5b21b6" stroke-width="2" stroke-opacity="0.5" style="animation-delay:3s"/>
  <path class="energy" d="M320 240 Q240 210 160 160" stroke="url(#arcG)" stroke-width="1.8" stroke-opacity="0.45" style="animation-delay:6s"/>
</svg>
