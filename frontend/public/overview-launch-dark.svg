<svg xmlns="http://www.w3.org/2000/svg" width="440" height="360" viewBox="0 0 440 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="440" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08101D"/>
      <stop offset="60%" stop-color="#0C1525"/>
      <stop offset="100%" stop-color="#1A0C1A"/>
    </linearGradient>
    <radialGradient id="gR" cx="0.7" cy="0.4" r="0.65" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gC" cx="0.25" cy="0.6" r="0.6" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#2A3548" stroke-opacity="0.4" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="gridFade" x1="0" y1="0" x2="440" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="gm"><rect width="440" height="360" fill="url(#gridFade)"/></mask>
    <linearGradient id="brandH" x1="0" y1="0" x2="440" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#DC2626" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brandV" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arcG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="arcGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Rocket trail gradient -->
    <linearGradient id="trail" x1="280" y1="100" x2="280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <style>
      .tw{animation:tw 3s ease-in-out infinite}
      .tw2{animation:tw 4.8s ease-in-out infinite}
      .tw3{animation:tw 2.4s ease-in-out infinite}
      .tw4{animation:tw 5.5s ease-in-out infinite}
      .tw5{animation:tw 3.6s ease-in-out infinite}
      @keyframes tw{0%,100%{opacity:1}50%{opacity:.2}}
    </style>
  </defs>

  <rect width="440" height="360" rx="20" fill="url(#bg)"/>
  <rect width="440" height="360" rx="20" fill="url(#gR)"/>
  <rect width="440" height="360" rx="20" fill="url(#gC)"/>

  <g mask="url(#gm)">
    <rect width="440" height="360" fill="url(#grid)" opacity="0.7"/>
    <g opacity="0.6">
      <path d="M20 80H420" stroke="url(#brandH)" stroke-width="0.8"/>
      <path d="M20 160H420" stroke="url(#brandH)" stroke-width="1.0"/>
      <path d="M20 240H420" stroke="url(#brandH)" stroke-width="0.8"/>
    </g>
    <g opacity="0.5">
      <path d="M100 10V350" stroke="url(#brandV)" stroke-width="0.8"/>
      <path d="M200 10V350" stroke="url(#brandV)" stroke-width="1.0"/>
      <path d="M300 10V350" stroke="url(#brandV)" stroke-width="0.8"/>
      <path d="M380 10V350" stroke="url(#brandV)" stroke-width="0.6"/>
    </g>
  </g>

  <!-- City-light nodes -->
  <g filter="url(#glow)" opacity="0.65">
    <circle cx="100" cy="80" r="3" fill="#00D4FF" class="tw"/>
    <circle cx="200" cy="160" r="3" fill="#7C3AED" class="tw2"/>
    <circle cx="300" cy="80" r="3" fill="#DC2626" class="tw4"/>
    <circle cx="380" cy="240" r="3" fill="#DC2626" class="tw5"/>
    <circle cx="100" cy="240" r="3" fill="#00D4FF" class="tw3"/>
  </g>

  <!-- Connection arcs -->
  <g opacity="0.35" fill="none" stroke-width="1.2" stroke-linecap="round" filter="url(#arcGlow)">
    <path d="M100 80 Q150 50 200 160" stroke="#00D4FF"/>
    <path d="M200 160 Q250 100 300 80" stroke="#7C3AED"/>
    <path d="M300 80 Q340 140 380 240" stroke="#DC2626"/>
    <path d="M100 240 Q150 180 200 160" stroke="#00D4FF"/>
  </g>

  <!-- Rocket trail — diagonal energy burst from bottom-left to focal point -->
  <path d="M280 100 Q285 160 290 240 Q292 280 288 320" stroke="url(#trail)" stroke-width="2.4" stroke-linecap="round" fill="none" filter="url(#arcGlow)"/>
  <path d="M276 100 Q270 170 264 260" stroke="url(#trail)" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5" filter="url(#arcGlow)"/>
  <path d="M284 100 Q295 165 306 250" stroke="url(#trail)" stroke-width="1.0" stroke-linecap="round" fill="none" opacity="0.4" filter="url(#arcGlow)"/>

  <!-- Focal launch point — starburst -->
  <g filter="url(#glow)">
    <line x1="280" y1="100" x2="280" y2="72" stroke="#DC2626" stroke-width="1.2" stroke-opacity="0.6" stroke-linecap="round"/>
    <line x1="280" y1="100" x2="300" y2="82" stroke="#DC2626" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round"/>
    <line x1="280" y1="100" x2="260" y2="82" stroke="#DC2626" stroke-width="0.8" stroke-opacity="0.4" stroke-linecap="round"/>
    <line x1="280" y1="100" x2="300" y2="118" stroke="#7C3AED" stroke-width="0.6" stroke-opacity="0.3" stroke-linecap="round"/>
    <line x1="280" y1="100" x2="260" y2="118" stroke="#00D4FF" stroke-width="0.6" stroke-opacity="0.3" stroke-linecap="round"/>
  </g>
  <circle cx="280" cy="100" r="5" fill="#DC2626" fill-opacity="0.85" filter="url(#glow)" class="tw3"/>
  <circle cx="280" cy="100" r="3" fill="#DC2626" opacity="0.95"/>

  <!-- Expanding rings from launch point -->
  <circle cx="280" cy="100" r="18" fill="none" stroke="#DC2626" stroke-opacity="0.15" stroke-width="0.8"/>
  <circle cx="280" cy="100" r="32" fill="none" stroke="#DC2626" stroke-opacity="0.08" stroke-width="0.6"/>
  <circle cx="280" cy="100" r="50" fill="none" stroke="#7C3AED" stroke-opacity="0.05" stroke-width="0.5"/>
</svg>
