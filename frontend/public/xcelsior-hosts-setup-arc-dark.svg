    </linearGradient>
    <linearGradient id="edgeFadeTop" x1="0" y1="0" x2="0" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="edgeFadeMask">
      <rect x="0" y="0" width="1200" height="900" fill="black"/>
      <rect x="0" y="0" width="1200" height="900" fill="white"/>
      <rect x="0" y="0" width="128" height="900" fill="url(#edgeFadeLeft)"/>
      <rect x="0" y="0" width="1200" height="52" fill="url(#edgeFadeTop)"/>
    </mask>

    <linearGradient id="brandH" x1="70" y1="0" x2="1140" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="16%" stop-color="#00D4FF" stop-opacity="0.46"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.34"/>
      <stop offset="82%" stop-color="#DC2626" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brandV" x1="0" y1="24" x2="0" y2="770" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.56"/>
      <stop offset="44%" stop-color="#7C3AED" stop-opacity="0.34"/>
      <stop offset="76%" stop-color="#DC2626" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="184" y1="124" x2="988" y2="618" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.84"/>
      <stop offset="40%" stop-color="#00D4FF" stop-opacity="0.72"/>
      <stop offset="76%" stop-color="#7C3AED" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="arcGradWarm" x1="250" y1="178" x2="1010" y2="626" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.7"/>
      <stop offset="45%" stop-color="#7C3AED" stop-opacity="0.74"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0.62"/>
    </linearGradient>

    <linearGradient id="serverTop" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#12233B" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0B1526" stop-opacity="0.34"/>
    </linearGradient>
    <linearGradient id="serverFace" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0F1D32" stop-opacity="0.82"/>
      <stop offset="55%" stop-color="#091321" stop-opacity="0.44"/>
      <stop offset="100%" stop-color="#2A123B" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="serverSide" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0E2538" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#35131E" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="serverStroke" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.72"/>
      <stop offset="52%" stop-color="#7C3AED" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="serverFade" x1="760" y1="410" x2="1188" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.98"/>
      <stop offset="48%" stop-color="white" stop-opacity="0.78"/>
      <stop offset="80%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="serverMask">
      <rect x="0" y="0" width="1200" height="900" fill="black"/>
      <rect x="728" y="392" width="500" height="520" rx="10" fill="url(#serverFade)"/>
    </mask>
    <radialGradient id="serverHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(974 612) rotate(90) scale(290 280)">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="42%" stop-color="#00D4FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="dotGlow" x="-240%" y="-240%" width="580%" height="580%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="arcGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow" x="-260%" y="-260%" width="620%" height="620%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .twinkle{animation:twinkle 4.6s ease-in-out infinite}
      .twinkle-fast{animation:twinkle 3s ease-in-out infinite}
      .twinkle-slow{animation:twinkle 6s ease-in-out infinite}
      .landing{animation:landing 4.8s ease-in-out infinite}
      .energy{fill:none;stroke-linecap:round;stroke-dasharray:360 4200;animation:flow 13s linear infinite}
      @keyframes twinkle{0%,100%{opacity:1}50%{opacity:.22}}
      @keyframes landing{0%,100%{opacity:1}50%{opacity:.18}}
      @keyframes flow{from{stroke-dashoffset:4560}to{stroke-dashoffset:0}}
    </style>
  </defs>

  <g mask="url(#edgeFadeMask)">
    <rect width="1200" height="900" rx="40" fill="url(#bg)"/>
    <rect width="1200" height="900" rx="40" fill="url(#cyanGlow)"/>
    <rect width="1200" height="900" rx="40" fill="url(#violetGlow)"/>
    <rect width="1200" height="900" rx="40" fill="url(#redGlow)"/>
  </g>

  <g mask="url(#gridMask)">
    <rect width="1200" height="900" fill="url(#majorGrid)" opacity="0.82"/>
    <rect width="1200" height="900" fill="url(#minorGrid)" opacity="0.68"/>

    <g opacity="0.72">
      <path d="M62 84H1144" stroke="url(#brandH)" stroke-width="1.05"/>
      <path d="M62 168H1144" stroke="url(#brandH)" stroke-width="1.05"/>
