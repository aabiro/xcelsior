        <path d="M246 74L332 122V186L246 138Z" fill="url(#serverSide)" stroke="url(#serverStroke)" stroke-width="0.9"/>
        <path d="M158 176L284 156" stroke="#7C3AED" stroke-opacity="0.58" stroke-width="1.65" stroke-linecap="round"/>
