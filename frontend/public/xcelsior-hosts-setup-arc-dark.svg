        <line x1="160" y1="120" x2="126" y2="94" stroke="#00D4FF" stroke-opacity="0.24" stroke-width="0.85" stroke-linecap="round"/>
        <line x1="160" y1="120" x2="198" y2="142" stroke="#7C3AED" stroke-opacity="0.22" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="160" y1="120" x2="126" y2="144" stroke="#00D4FF" stroke-opacity="0.18" stroke-width="0.8" stroke-linecap="round"/>
