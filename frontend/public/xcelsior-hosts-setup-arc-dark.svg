    <circle cx="514" cy="182" r="4.2" fill="#00D4FF" class="twinkle-slow"/>
    <circle cx="656" cy="116" r="4.2" fill="#7C3AED" class="twinkle-fast"/>
    <circle cx="656" cy="310" r="4.2" fill="#DC2626" class="twinkle"/>
    <circle cx="174" cy="362" r="4.2" fill="#00D4FF" class="twinkle-slow"/>
    <circle cx="972" cy="608" r="5.2" fill="#DC2626" class="landing"/>
    <circle cx="948" cy="642" r="3.4" fill="#00D4FF" class="landing"/>
    <circle cx="1008" cy="566" r="3.2" fill="#7C3AED" class="landing"/>
  </g>

  <g fill="none" stroke-linecap="round" filter="url(#arcGlow)">
