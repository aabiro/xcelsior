      <path d="M320 24V770" stroke="url(#brandV)" stroke-width="1.05"/>
      <path d="M480 24V770" stroke="url(#brandV)" stroke-width="1.45"/>
      <path d="M642 24V770" stroke="url(#brandV)" stroke-width="1.05"/>
      <path d="M804 24V770" stroke="url(#brandV)" stroke-width="0.85"/>
      <path d="M968 24V770" stroke="url(#brandV)" stroke-width="0.85"/>
