    <path d="M318 236 Q438 150 656 116" stroke="url(#arcGradWarm)" stroke-width="2.05" stroke-opacity="0.54"/>
    <path d="M174 362 Q388 248 514 182" stroke="url(#arcGrad)" stroke-width="1.85" stroke-opacity="0.44"/>
    <path d="M514 182 Q744 174 972 608" stroke="url(#arcGradWarm)" stroke-width="2.45" stroke-opacity="0.66"/>
    <path d="M318 236 Q650 300 972 608" stroke="url(#arcGrad)" stroke-width="2.0" stroke-opacity="0.52"/>
    <path d="M174 362 Q510 486 972 608" stroke="url(#arcGradWarm)" stroke-width="1.8" stroke-opacity="0.4"/>
    <path d="M656 116 Q822 52 1118 162" stroke="url(#arcGrad)" stroke-width="1.6" stroke-opacity="0.28"/>
    <path d="M514 182 Q708 122 982 218" stroke="url(#arcGradWarm)" stroke-width="1.45" stroke-opacity="0.24"/>

    <path class="energy" d="M514 182 Q744 174 972 608" stroke="url(#arcGradWarm)" stroke-width="3" stroke-opacity="0.74"/>
    <path class="energy" d="M318 236 Q650 300 972 608" stroke="url(#arcGrad)" stroke-width="2.45" stroke-opacity="0.62" style="animation-delay:4s;animation-duration:15s"/>
    <path class="energy" d="M176 146 Q316 70 514 182" stroke="url(#arcGrad)" stroke-width="2.2" stroke-opacity="0.46" style="animation-delay:8s;animation-duration:17s"/>
  </g>

