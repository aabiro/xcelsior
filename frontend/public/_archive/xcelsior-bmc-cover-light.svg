    <radialGradient id="topCyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(520 58) rotate(90) scale(290 560)">
      <stop offset="0%" stop-color="#0284C7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0"/>
