    <path d="M102.6,56.9 L117.4,59.5 L115.4,54.0 L115.8,52.8 L131.8,39.8 L128.1,38.1 L127.6,36.8 L130.8,27.0 L121.5,28.9 L120.2,28.2 L118.5,24.0 L111.2,31.8 L109.4,30.9 L112.8,12.9 L107.2,16.1 L105.6,15.6 L100.0,4.5 L94.4,15.6 L92.8,16.1 L87.2,12.9 L90.6,30.9 L88.8,31.8 L81.5,24.0 L79.8,28.2 L78.5,28.9 L69.2,27.0 L72.4,36.8 L71.9,38.1 L68.2,39.8 L84.2,52.8 L84.6,54.0 L82.6,59.5 L97.4,56.9 Z" fill="#00d4ff" opacity="0.35" filter="url(#leafGlow)"/>
    <!-- Maple leaf -->
    <path d="M102.6,56.9 L117.4,59.5 L115.4,54.0 L115.8,52.8 L131.8,39.8 L128.1,38.1 L127.6,36.8 L130.8,27.0 L121.5,28.9 L120.2,28.2 L118.5,24.0 L111.2,31.8 L109.4,30.9 L112.8,12.9 L107.2,16.1 L105.6,15.6 L100.0,4.5 L94.4,15.6 L92.8,16.1 L87.2,12.9 L90.6,30.9 L88.8,31.8 L81.5,24.0 L79.8,28.2 L78.5,28.9 L69.2,27.0 L72.4,36.8 L71.9,38.1 L68.2,39.8 L84.2,52.8 L84.6,54.0 L82.6,59.5 L97.4,56.9 Z" fill="url(#brandGrad)"/>
    <!-- X letterform -->
    <path d="M48,64 L72,64 L100,108 L128,64 L152,64 L112,124 L152,186 L128,186 L100,140 L72,186 L48,186 L88,124 Z" fill="url(#brandGrad)"/>
  </g>
  <!-- Wordmark text below -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" letter-spacing="-2">
    <tspan fill="url(#textAccent)">X</tspan><tspan fill="#f0f4ff">celsior</tspan>
  </text>
  <!-- Tagline -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#f0f4ff" opacity="0.5" letter-spacing="4">SOVEREIGN GPU COMPUTE</text>
