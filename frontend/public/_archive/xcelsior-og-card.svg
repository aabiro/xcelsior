<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="brandGrad" x1="100" y1="4" x2="100" y2="186" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="35%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="leafGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <linearGradient id="textAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Subtle radial glow behind logo -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Navy background -->
  <rect width="1200" height="630" fill="#0a0e1a"/>
  <!-- Subtle ambient glow -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <!-- Logo icon centered, scaled from 200x200 -->
  <g transform="translate(545, 100) scale(0.55)">
