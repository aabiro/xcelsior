      <rect x="58" y="84" width="322" height="104" rx="28" fill="#0D1729" fill-opacity="0.86" stroke="url(#serverStroke)" stroke-opacity="0.76" stroke-width="2.2"/>
      <rect x="58" y="220" width="322" height="104" rx="28" fill="#0B1526" fill-opacity="0.82" stroke="url(#serverStroke)" stroke-opacity="0.72" stroke-width="2.2"/>
      <rect x="58" y="356" width="322" height="104" rx="28" fill="#091320" fill-opacity="0.78" stroke="url(#serverStroke)" stroke-opacity="0.70" stroke-width="2.2"/>

