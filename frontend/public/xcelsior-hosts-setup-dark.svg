<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="148" y1="44" x2="1032" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08101D"/>
      <stop offset="55%" stop-color="#0C1525"/>
      <stop offset="100%" stop-color="#160C1D"/>
    </linearGradient>

    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(394 80) rotate(90) scale(360 580)">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(826 122) rotate(90) scale(340 560)">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
