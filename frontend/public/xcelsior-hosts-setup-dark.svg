      <circle cx="510" cy="300" r="5.5" fill="#7C3AED"/>
      <circle cx="670" cy="172" r="5.5" fill="#7C3AED"/>
      <circle cx="830" cy="364" r="5.5" fill="#DC2626"/>
      <circle cx="190" cy="428" r="5.5" fill="#00D4FF"/>
      <circle cx="990" cy="236" r="5.5" fill="#DC2626"/>
