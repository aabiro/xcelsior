      <path d="M670 40V812" stroke="url(#brandV)" stroke-width="2"/>
      <path d="M830 40V812" stroke="url(#brandV)" stroke-width="1.6"/>
      <path d="M990 40V812" stroke="url(#brandV)" stroke-width="1.6"/>
