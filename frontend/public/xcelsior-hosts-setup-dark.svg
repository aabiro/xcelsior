<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="148" y1="44" x2="1032" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#08101D"/>
      <stop offset="55%" stop-color="#0C1525"/>
      <stop offset="100%" stop-color="#160C1D"/>
    </linearGradient>

    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(394 80) rotate(90) scale(360 580)">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(826 122) rotate(90) scale(340 560)">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1032 190) rotate(90) scale(260 420)">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>

    <pattern id="majorGrid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" stroke="#2A3548" stroke-opacity="0.72" stroke-width="1"/>
    </pattern>
    <pattern id="minorGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" stroke="#1A2235" stroke-opacity="0.78" stroke-width="1"/>
    </pattern>

    <!-- Asymmetric grid fade — heavier top-left, lighter drift bottom-right -->
    <radialGradient id="gridFade" cx="0.32" cy="0.18" r="0.82" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="38%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="62%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridMask">
      <rect x="0" y="0" width="1200" height="900" fill="url(#gridFade)"/>
    </mask>

    <linearGradient id="brandH" x1="80" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="16%" stop-color="#00D4FF" stop-opacity="0.74"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.66"/>
      <stop offset="84%" stop-color="#DC2626" stop-opacity="0.46"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brandV" x1="0" y1="40" x2="0" y2="814" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.82"/>
      <stop offset="42%" stop-color="#7C3AED" stop-opacity="0.58"/>
      <stop offset="76%" stop-color="#DC2626" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="serverStroke" x1="708" y1="384" x2="1164" y2="874" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="54%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="serverFill" x1="724" y1="392" x2="1130" y2="852" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#101C31" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0A1322" stop-opacity="0.78"/>
    </linearGradient>
    <radialGradient id="serverHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(986 716) rotate(90) scale(260 248)">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.18"/>
      <stop offset="48%" stop-color="#7C3AED" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="serverMaskFill" x1="778" y1="436" x2="1158" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.96"/>
      <stop offset="64%" stop-color="white" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.28"/>
    </linearGradient>
    <mask id="serverMask">
      <rect x="0" y="0" width="1200" height="900" fill="black"/>
      <rect x="700" y="352" width="500" height="548" rx="20" fill="url(#serverMaskFill)"/>
    </mask>

    <filter id="softShadow" x="666" y="334" width="584" height="614" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="36" stdDeviation="42" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="ledGlow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="900" rx="40" fill="url(#bg)"/>
  <rect width="1200" height="900" rx="40" fill="url(#cyanGlow)"/>
  <rect width="1200" height="900" rx="40" fill="url(#violetGlow)"/>
  <rect width="1200" height="900" rx="40" fill="url(#redGlow)"/>

  <g mask="url(#gridMask)">
    <rect width="1200" height="900" rx="40" fill="url(#majorGrid)" opacity="0.94"/>
    <rect width="1200" height="900" rx="40" fill="url(#minorGrid)" opacity="0.86"/>

    <g opacity="0.92">
      <path d="M80 108H1120" stroke="url(#brandH)" stroke-width="1.6"/>
      <path d="M80 172H1120" stroke="url(#brandH)" stroke-width="1.6"/>
      <path d="M80 236H1120" stroke="url(#brandH)" stroke-width="1.6"/>
      <path d="M80 300H1120" stroke="url(#brandH)" stroke-width="1.9"/>
      <path d="M80 364H1120" stroke="url(#brandH)" stroke-width="1.6"/>
      <path d="M80 428H1120" stroke="url(#brandH)" stroke-width="1.6"/>
      <path d="M80 492H1120" stroke="url(#brandH)" stroke-width="1.6"/>
    </g>

    <g opacity="0.9">
      <path d="M190 40V812" stroke="url(#brandV)" stroke-width="1.6"/>
      <path d="M350 40V812" stroke="url(#brandV)" stroke-width="1.6"/>
      <path d="M510 40V812" stroke="url(#brandV)" stroke-width="1.6"/>
      <path d="M670 40V812" stroke="url(#brandV)" stroke-width="2"/>
      <path d="M830 40V812" stroke="url(#brandV)" stroke-width="1.6"/>
      <path d="M990 40V812" stroke="url(#brandV)" stroke-width="1.6"/>
    </g>

    <g opacity="0.46">
      <circle cx="350" cy="236" r="5.5" fill="#00D4FF"/>
      <circle cx="510" cy="300" r="5.5" fill="#7C3AED"/>
      <circle cx="670" cy="172" r="5.5" fill="#7C3AED"/>
      <circle cx="830" cy="364" r="5.5" fill="#DC2626"/>
      <circle cx="190" cy="428" r="5.5" fill="#00D4FF"/>
      <circle cx="990" cy="236" r="5.5" fill="#DC2626"/>
    </g>
  </g>

  <ellipse cx="986" cy="716" rx="246" ry="236" fill="url(#serverHalo)"/>

  <g filter="url(#softShadow)" mask="url(#serverMask)">
    <g transform="translate(744 392)">
      <!-- Rear chassis (offset shadow) -->
      <rect x="58" y="18" width="382" height="506" rx="12" fill="#080E1A" fill-opacity="0.6" stroke="url(#serverStroke)" stroke-opacity="0.22" stroke-width="1.2"/>
      <!-- Main chassis -->
      <rect x="18" y="0" width="382" height="506" rx="12" fill="url(#serverFill)" stroke="url(#serverStroke)" stroke-width="1.6"/>

      <!-- Bay 1 -->
      <rect x="38" y="32" width="342" height="86" rx="6" fill="#0D1729" fill-opacity="0.86" stroke="url(#serverStroke)" stroke-opacity="0.38" stroke-width="1.0"/>
      <!-- Ventilation slits -->
      <g stroke="#1A2844" stroke-opacity="0.6" stroke-width="0.8">
        <path d="M56 52H138"/><path d="M56 60H138"/><path d="M56 68H138"/><path d="M56 76H138"/><path d="M56 84H138"/><path d="M56 92H138"/><path d="M56 100H138"/>
      </g>
      <!-- Activity bar -->
      <path d="M158 74H296" stroke="#00D4FF" stroke-opacity="0.72" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M158 86H260" stroke="#00D4FF" stroke-opacity="0.32" stroke-width="1.2" stroke-linecap="round"/>
      <!-- LEDs -->
      <g filter="url(#ledGlow)">
        <circle cx="330" cy="58" r="3.5" fill="#00D4FF" fill-opacity="0.9"/>
        <circle cx="344" cy="58" r="3.5" fill="#7C3AED" fill-opacity="0.7"/>
        <circle cx="358" cy="58" r="3.5" fill="#00D4FF" fill-opacity="0.35"/>
      </g>
      <!-- Port indicators -->
      <rect x="316" y="82" width="12" height="6" rx="1.5" fill="#00D4FF" fill-opacity="0.28" stroke="#00D4FF" stroke-opacity="0.42" stroke-width="0.6"/>
      <rect x="334" y="82" width="12" height="6" rx="1.5" fill="#7C3AED" fill-opacity="0.22" stroke="#7C3AED" stroke-opacity="0.36" stroke-width="0.6"/>
      <rect x="352" y="82" width="12" height="6" rx="1.5" fill="none" stroke="#2A3548" stroke-opacity="0.4" stroke-width="0.6"/>

      <!-- Bay 2 -->
      <rect x="38" y="138" width="342" height="86" rx="6" fill="#0B1526" fill-opacity="0.82" stroke="url(#serverStroke)" stroke-opacity="0.34" stroke-width="1.0"/>
      <g stroke="#1A2844" stroke-opacity="0.5" stroke-width="0.8">
        <path d="M56 158H138"/><path d="M56 166H138"/><path d="M56 174H138"/><path d="M56 182H138"/><path d="M56 190H138"/><path d="M56 198H138"/><path d="M56 206H138"/>
      </g>
      <path d="M158 180H310" stroke="#7C3AED" stroke-opacity="0.68" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M158 192H244" stroke="#7C3AED" stroke-opacity="0.28" stroke-width="1.2" stroke-linecap="round"/>
      <g filter="url(#ledGlow)">
        <circle cx="330" cy="164" r="3.5" fill="#00D4FF" fill-opacity="0.55"/>
        <circle cx="344" cy="164" r="3.5" fill="#7C3AED" fill-opacity="0.9"/>
        <circle cx="358" cy="164" r="3.5" fill="#00D4FF" fill-opacity="0.3"/>
      </g>
      <rect x="316" y="188" width="12" height="6" rx="1.5" fill="#7C3AED" fill-opacity="0.24" stroke="#7C3AED" stroke-opacity="0.38" stroke-width="0.6"/>
      <rect x="334" y="188" width="12" height="6" rx="1.5" fill="#00D4FF" fill-opacity="0.18" stroke="#00D4FF" stroke-opacity="0.32" stroke-width="0.6"/>
      <rect x="352" y="188" width="12" height="6" rx="1.5" fill="#7C3AED" fill-opacity="0.2" stroke="#7C3AED" stroke-opacity="0.34" stroke-width="0.6"/>

      <!-- Bay 3 -->
      <rect x="38" y="244" width="342" height="86" rx="6" fill="#091320" fill-opacity="0.78" stroke="url(#serverStroke)" stroke-opacity="0.30" stroke-width="1.0"/>
      <g stroke="#1A2844" stroke-opacity="0.4" stroke-width="0.8">
        <path d="M56 264H138"/><path d="M56 272H138"/><path d="M56 280H138"/><path d="M56 288H138"/><path d="M56 296H138"/><path d="M56 304H138"/><path d="M56 312H138"/>
      </g>
      <path d="M158 286H278" stroke="#DC2626" stroke-opacity="0.62" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M158 298H232" stroke="#DC2626" stroke-opacity="0.24" stroke-width="1.2" stroke-linecap="round"/>
      <g filter="url(#ledGlow)">
        <circle cx="330" cy="270" r="3.5" fill="#00D4FF" fill-opacity="0.3"/>
        <circle cx="344" cy="270" r="3.5" fill="#7C3AED" fill-opacity="0.5"/>
        <circle cx="358" cy="270" r="3.5" fill="#DC2626" fill-opacity="0.85"/>
      </g>
      <rect x="316" y="294" width="12" height="6" rx="1.5" fill="#DC2626" fill-opacity="0.22" stroke="#DC2626" stroke-opacity="0.36" stroke-width="0.6"/>
      <rect x="334" y="294" width="12" height="6" rx="1.5" fill="none" stroke="#2A3548" stroke-opacity="0.36" stroke-width="0.6"/>
      <rect x="352" y="294" width="12" height="6" rx="1.5" fill="#DC2626" fill-opacity="0.16" stroke="#DC2626" stroke-opacity="0.28" stroke-width="0.6"/>

      <!-- Bay 4 (partial, fading out) -->
      <rect x="38" y="350" width="342" height="86" rx="6" fill="#081020" fill-opacity="0.5" stroke="url(#serverStroke)" stroke-opacity="0.18" stroke-width="1.0"/>
      <g stroke="#1A2844" stroke-opacity="0.24" stroke-width="0.8">
        <path d="M56 370H138"/><path d="M56 378H138"/><path d="M56 386H138"/><path d="M56 394H138"/><path d="M56 402H138"/><path d="M56 410H138"/><path d="M56 418H138"/>
      </g>
      <path d="M158 392H266" stroke="#DC2626" stroke-opacity="0.34" stroke-width="2.4" stroke-linecap="round"/>
      <g filter="url(#ledGlow)" opacity="0.5">
        <circle cx="330" cy="376" r="3.5" fill="#DC2626" fill-opacity="0.4"/>
        <circle cx="344" cy="376" r="3.5" fill="#7C3AED" fill-opacity="0.3"/>
        <circle cx="358" cy="376" r="3.5" fill="#DC2626" fill-opacity="0.55"/>
      </g>

      <!-- Bottom detail lines -->
      <path d="M34 470H200" stroke="url(#serverStroke)" stroke-opacity="0.26" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M54 484H180" stroke="url(#serverStroke)" stroke-opacity="0.14" stroke-width="1.0" stroke-linecap="round"/>
    </g>
  </g>

  <rect x="14" y="14" width="1172" height="872" rx="28" stroke="#1A2235" stroke-width="1.5"/>
</svg>
