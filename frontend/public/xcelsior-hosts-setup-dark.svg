      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.66"/>
      <stop offset="84%" stop-color="#DC2626" stop-opacity="0.46"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
