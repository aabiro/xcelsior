      <circle cx="356" cy="136" r="10" fill="#7C3AED" fill-opacity="0.68"/>
      <circle cx="382" cy="136" r="10" fill="#DC2626" fill-opacity="0.56"/>

      <circle cx="330" cy="272" r="10" fill="#00D4FF" fill-opacity="0.60"/>
      <circle cx="356" cy="272" r="10" fill="#7C3AED" fill-opacity="0.84"/>
      <circle cx="382" cy="272" r="10" fill="#DC2626" fill-opacity="0.56"/>

      <circle cx="330" cy="408" r="10" fill="#00D4FF" fill-opacity="0.48"/>
      <circle cx="356" cy="408" r="10" fill="#7C3AED" fill-opacity="0.66"/>
      <circle cx="382" cy="408" r="10" fill="#DC2626" fill-opacity="0.88"/>

