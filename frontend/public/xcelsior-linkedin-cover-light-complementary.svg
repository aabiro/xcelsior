      .pulse-slow{animation:pulse 5s ease-in-out infinite}
      .pulse-offset{animation:pulse 3.6s ease-in-out infinite;animation-delay:1.4s}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
    </style>
