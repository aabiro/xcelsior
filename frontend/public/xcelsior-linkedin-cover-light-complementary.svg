      <rect x="0" y="0" width="200" height="700" fill="url(#fadeLeft)"/>
      <rect x="4000" y="0" width="200" height="700" fill="url(#fadeRight)"/>
      <rect x="0" y="0" width="4200" height="120" fill="url(#fadeTop)"/>
      <rect x="0" y="580" width="4200" height="120" fill="url(#fadeBottom)"/>
    </mask>
    <filter id="dotGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
